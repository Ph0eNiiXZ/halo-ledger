<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Ledger: Private Tracker</title>
<meta name="theme-color" content="#12161B">
<meta name="description" content="A private, on-device income and expense tracker. No account, no cloud, no sync.">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icons/icon-192.png">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ledger">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS ============ */
:root{
  --bg:#262B31;
  --surface:#2F353D;
  --surface-2:#383F48;
  --surface-3:#434B56;
  --paper:#E7E2D3;
  --ink:#E7E2D3;
  --ink-dim:#9CA4B0;
  --ink-faint:#727B87;
  --red:#CC584F;
  --red-dim:rgba(204,88,79,0.16);
  --green:#5B9C79;
  --green-dim:rgba(91,156,121,0.16);
  --amber:#D69A4C;
  --amber-dim:rgba(214,154,76,0.16);
  --line:rgba(231,226,211,0.13);
  --line-strong:rgba(231,226,211,0.24);
  --radius:14px;
  --radius-sm:9px;
  --font-display:'Space Grotesk',ui-sans-serif,system-ui,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace;
  --font-body:'Inter',ui-sans-serif,system-ui,-apple-system,sans-serif;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);}
html{ scrollbar-width:thin; scrollbar-color:var(--line-strong) transparent; }
*{ scrollbar-width:thin; scrollbar-color:var(--line-strong) transparent; }
::-webkit-scrollbar{ width:6px; height:6px; }
::-webkit-scrollbar-track{ background:transparent; }
::-webkit-scrollbar-thumb{ background:var(--line-strong); border-radius:10px; }
::-webkit-scrollbar-thumb:hover{ background:var(--ink-faint); }
body{
  font-family:var(--font-body);
  color:var(--ink);
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior-y:none;
  min-height:100vh;
}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
}
button{font-family:inherit;}
input,select{font-family:inherit;}

/* ============ APP SHELL ============ */
#app{
  max-width:520px;
  margin:0 auto;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  position:relative;
  background:
    radial-gradient(ellipse 600px 300px at 50% -10%, rgba(75,139,107,0.06), transparent 60%),
    var(--bg);
}

.topbar{
  padding:calc(16px + var(--safe-top)) 20px 14px;
  border-bottom:1px dashed var(--line-strong);
  display:flex;
  align-items:baseline;
  justify-content:space-between;
}
.topbar .eyebrow{
  font-family:var(--font-mono);
  font-size:10.5px;
  letter-spacing:0.18em;
  color:var(--ink-faint);
  text-transform:uppercase;
}
.topbar .title{
  font-family:var(--font-display);
  font-size:20px;
  font-weight:700;
  letter-spacing:-0.01em;
  margin-top:2px;
}
.topbar .stamp-mark{
  width:34px;height:34px;
  border:1.5px solid var(--line-strong);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);
  font-size:14px;
  color:var(--green);
  flex-shrink:0;
  transform:rotate(-6deg);
}

#view-root{
  flex:1;
  padding:18px 20px calc(100px + var(--safe-bottom));
  overflow-y:auto;
}

.view-enter{ animation:fadeUp 220ms ease both; }
@keyframes fadeUp{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

/* ============ TAB BAR ============ */
.tabbar{
  position:fixed;
  bottom:0; left:0; right:0;
  max-width:520px;
  margin:0 auto;
  display:flex;
  background:rgba(27,33,41,0.92);
  backdrop-filter:blur(14px);
  border-top:1px solid var(--line);
  padding:8px 6px calc(8px + var(--safe-bottom));
  z-index:40;
}
.tab-btn{
  flex:1;
  background:none;
  border:none;
  color:var(--ink-faint);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
  padding:6px 2px;
  cursor:pointer;
  border-radius:10px;
}
.tab-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.7;}
.tab-btn span{font-size:10.5px;font-family:var(--font-mono);letter-spacing:0.03em;}
.tab-btn.active{color:var(--ink);}
.tab-btn.active svg{stroke:var(--green);}

.fab{
  position:fixed;
  right:calc(50% - 260px + 20px);
  bottom:calc(74px + var(--safe-bottom));
  width:56px;height:56px;
  border-radius:50%;
  background:var(--ink);
  color:var(--bg);
  border:none;
  font-family:var(--font-display);
  font-size:28px;
  font-weight:600;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 24px rgba(0,0,0,0.45), 0 0 0 6px rgba(231,226,211,0.06);
  cursor:pointer;
  z-index:45;
  transition:transform 120ms ease;
}
.fab:active{transform:scale(0.92);}
@media (min-width:521px){
  .fab{ right:calc(50vw - 260px + 20px); }
}
@media (max-width:520px){
  .fab{ right:20px; }
}

/* ============ CARDS / SECTIONS ============ */
.section-label{
  font-family:var(--font-mono);
  font-size:10.5px;
  letter-spacing:0.14em;
  text-transform:uppercase;
  color:var(--ink-faint);
  margin:0 0 10px;
  display:flex;
  align-items:center;
  gap:8px;
}
.section-label::after{
  content:'';
  flex:1;
  border-bottom:1px dashed var(--line);
}
.card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:16px;
}
.card + .card{margin-top:12px;}

.summary-row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  margin-bottom:18px;
}
.summary-card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:13px 10px;
  text-align:left;
}
.summary-card .lbl{
  font-family:var(--font-mono);
  font-size:9.5px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--ink-faint);
  display:block;
  margin-bottom:6px;
}
.summary-card .val{
  font-family:var(--font-mono);
  font-size:16px;
  font-weight:600;
  letter-spacing:-0.02em;
  word-break:break-word;
}
.summary-card.income .val{color:var(--green);}
.summary-card.expense .val{color:var(--red);}

/* ============ RECEIPT LIST ============ */
.receipt{
  list-style:none; margin:0; padding:0;
}
.receipt-day{
  font-family:var(--font-mono);
  font-size:10.5px;
  color:var(--ink-faint);
  letter-spacing:0.06em;
  margin:16px 0 8px;
  text-transform:uppercase;
}
.receipt-day:first-child{margin-top:0;}
.txn-row{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 0;
  border-bottom:1px dotted var(--line-strong);
  cursor:pointer;
}
.txn-row:active{background:rgba(255,255,255,0.02);}
.badge{
  font-family:var(--font-mono);
  font-size:9.5px;
  letter-spacing:0.03em;
  padding:3px 8px;
  border-radius:20px;
  border:1px solid currentColor;
  white-space:nowrap;
  flex-shrink:0;
  transform:rotate(-1.5deg);
}
.txn-main{flex:1; min-width:0;}
.txn-note{font-size:13.5px; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.txn-note.muted{color:var(--ink-faint); font-style:italic;}
.txn-amt{
  font-family:var(--font-mono);
  font-size:14.5px;
  font-weight:600;
  flex-shrink:0;
}
.txn-amt.pos{color:var(--green);}
.txn-amt.neg{color:var(--red);}

.empty-state{
  text-align:center;
  padding:48px 16px;
  color:var(--ink-faint);
}
.empty-state .glyph{font-size:30px; margin-bottom:10px; opacity:0.5;}
.empty-state .msg{font-size:13.5px; line-height:1.5; max-width:280px; margin:0 auto;}
.empty-state .act{
  margin-top:14px;
  display:inline-block;
  font-family:var(--font-mono);
  font-size:12px;
  color:var(--green);
  border:1px dashed var(--green);
  padding:8px 14px;
  border-radius:20px;
  cursor:pointer;
  background:none;
}

/* ============ BUDGET / PROGRESS BARS ============ */
.bar-item{margin-bottom:14px;}
.bar-item:last-child{margin-bottom:0;}
.bar-top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; gap:8px;}
.bar-top .name{font-size:13px; color:var(--ink); display:flex; align-items:center; gap:6px; min-width:0;}
.bar-top .name .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.bar-top .stat{font-family:var(--font-mono); font-size:12px; color:var(--ink-faint); flex-shrink:0;}
.bar-track{
  height:7px;
  border-radius:6px;
  background:var(--surface-3);
  overflow:hidden;
  position:relative;
}
.bar-fill{height:100%; border-radius:6px; transition:width 400ms ease;}
.bar-marker{
  position:absolute; top:-3px; bottom:-3px; width:2px;
  background:var(--ink); border-radius:1px; opacity:0.8;
}
.goal-card{margin-bottom:0;}
.goal-sub{font-size:11.5px; color:var(--ink-faint); margin-top:8px;}

/* ============ MONTH NAV ============ */
.month-nav{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:16px;
}
.month-nav .lbl{
  font-family:var(--font-display);
  font-weight:600;
  font-size:16px;
}
.icon-btn{
  width:34px;height:34px;
  border-radius:50%;
  border:1px solid var(--line-strong);
  background:var(--surface);
  color:var(--ink);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
.icon-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;}

/* ============ CHIPS ============ */
.chip-row{display:flex; gap:8px; overflow-x:auto; padding-bottom:2px; margin-bottom:14px; scrollbar-width:none;}
.chip-row::-webkit-scrollbar{display:none;}
.chip{
  font-family:var(--font-mono);
  font-size:11.5px;
  padding:7px 13px;
  border-radius:20px;
  border:1px solid var(--line-strong);
  background:var(--surface);
  color:var(--ink-dim);
  white-space:nowrap;
  cursor:pointer;
  flex-shrink:0;
}
.chip.active{background:var(--ink); color:var(--bg); border-color:var(--ink); font-weight:600;}

.search-box{
  display:flex; align-items:center; gap:8px;
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius-sm);
  padding:9px 12px;
  margin-bottom:14px;
}
.search-box svg{width:15px;height:15px;stroke:var(--ink-faint);fill:none;stroke-width:2;flex-shrink:0;}
.search-box input{
  border:none; background:none; outline:none; color:var(--ink); font-size:13.5px; flex:1;
}
.search-box input::placeholder{color:var(--ink-faint);}

select.field, .select-native{
  width:100%;
  background:var(--surface);
  color:var(--ink);
  border:1px solid var(--line-strong);
  border-radius:var(--radius-sm);
  padding:11px 12px;
  font-size:14px;
  appearance:none;
  -webkit-appearance:none;
}

/* ============ SPARKLINE ============ */
.spark-wrap{margin-top:4px;}
.spark-wrap svg{width:100%; height:64px; display:block;}
.spark-labels{display:flex; justify-content:space-between; margin-top:4px;}
.spark-labels span{font-family:var(--font-mono); font-size:9.5px; color:var(--ink-faint);}

/* ============ MONTHLY BAR CHART ============ */
.mbar-chart{
  display:flex; align-items:flex-end; gap:10px;
  height:150px;
  padding-top:20px;
  border-bottom:1px dashed var(--line);
  margin-bottom:8px;
}
.mbar-group{flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; height:100%; justify-content:flex-end; min-width:0;}
.mbar-pair{display:flex; align-items:flex-end; gap:3px; width:100%; justify-content:center; flex:1;}
.mbar{
  width:9px;
  border-radius:3px 3px 0 0;
  min-height:2px;
  position:relative;
}
.mbar.income{background:var(--green);}
.mbar.expense{background:var(--red);}
.mbar-mlabel{font-family:var(--font-mono); font-size:9.5px; color:var(--ink-faint); white-space:nowrap;}
.legend-row{display:flex; gap:16px; margin-bottom:16px;}
.legend-item{display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--ink-dim);}
.legend-item .dot{width:8px;height:8px;border-radius:2px;}
.insight-row{
  font-size:13px; line-height:1.5; color:var(--ink-dim);
  padding:9px 0; border-bottom:1px dotted var(--line);
}
.insight-row:last-child{border-bottom:none; padding-bottom:0;}
.insight-row:first-child{padding-top:0;}

/* ============ STATS GRID ============ */
.stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:18px;}
.stat-tile{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:14px;}
.stat-tile .lbl{font-family:var(--font-mono); font-size:9.5px; letter-spacing:0.06em; text-transform:uppercase; color:var(--ink-faint); display:block; margin-bottom:6px;}
.stat-tile .val{font-family:var(--font-mono); font-size:17px; font-weight:600;}

/* ============ SETTINGS ============ */
.list-item{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  padding:12px 0;
  border-bottom:1px solid var(--line);
}
.list-item:last-child{border-bottom:none;}
.cat-row-left{display:flex; align-items:center; gap:10px; min-width:0;}
.cat-row-left .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.cat-row-left .info{min-width:0;}
.cat-row-left .name{font-size:13.5px;}
.cat-row-left .sub{font-family:var(--font-mono); font-size:10.5px; color:var(--ink-faint);}
.row-actions{display:flex; gap:6px; flex-shrink:0;}
.txt-btn{
  background:none; border:none; color:var(--ink-dim); font-size:12px; font-family:var(--font-mono);
  cursor:pointer; padding:6px 8px;
}
.txt-btn.danger{color:var(--red);}
.txt-btn.accent{color:var(--green);}

.btn{
  display:block; width:100%;
  padding:13px 16px;
  border-radius:var(--radius-sm);
  border:1px solid var(--line-strong);
  background:var(--surface);
  color:var(--ink);
  font-size:14px; font-weight:600;
  text-align:center;
  cursor:pointer;
}
.btn.primary{background:var(--ink); color:var(--bg); border-color:var(--ink);}
.btn.danger{border-color:var(--red); color:var(--red); background:none;}
.btn + .btn{margin-top:10px;}

.privacy-note{
  font-size:12px; line-height:1.6; color:var(--ink-faint);
  padding:14px; border:1px dashed var(--line-strong); border-radius:var(--radius);
  margin-top:18px;
}
.privacy-note b{color:var(--ink-dim);}

/* ============ THEME PICKER ============ */
.theme-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.theme-card{
  background:var(--surface-2);
  border:1.5px solid var(--line-strong);
  border-radius:var(--radius-sm);
  padding:12px;
  cursor:pointer;
  text-align:left;
  display:flex; flex-direction:column; gap:9px;
}
.theme-card.active{border-color:var(--ink);}
.theme-swatches{display:flex; gap:5px;}
.theme-swatches span{width:16px; height:16px; border-radius:50%; display:block; border:1px solid rgba(255,255,255,0.12);}
.theme-name{font-family:var(--font-mono); font-size:11.5px; color:var(--ink); display:flex; align-items:center; justify-content:space-between;}
.theme-name .check{color:var(--green); font-size:13px;}

/* ============ VISION BOARD ============ */
.board-hint{
  font-size:11.5px; color:var(--ink-faint); text-align:center; margin-bottom:14px; line-height:1.5;
}
.board-canvas{
  position:relative; width:100%; aspect-ratio:3/4;
  background:
    radial-gradient(circle, var(--line-strong) 1px, transparent 1.5px) 0 0/18px 18px,
    var(--surface);
  border:1px solid var(--line-strong);
  border-radius:var(--radius);
  overflow:hidden;
  touch-action:none;
}
.board-item{
  position:absolute;
  cursor:grab;
  user-select:none;
  -webkit-user-select:none;
  transform-origin:center center;
  touch-action:none;
}
.board-item.selected{ outline:2px dashed var(--green); outline-offset:5px; z-index:999 !important; }
.board-photo-img{ width:100%; height:100%; object-fit:cover; display:block; border-radius:5px; pointer-events:none; }
.frame-polaroid{
  background:#F2EEE2; padding:7% 7% 20% 7%; border-radius:2px;
  box-shadow:0 8px 18px rgba(0,0,0,0.4);
}
.frame-polaroid .board-photo-img{ border-radius:0; }
.polaroid-caption{
  position:absolute; bottom:5%; left:0; right:0; text-align:center;
  font-family:var(--font-display); font-weight:600; font-size:min(3.2vw,12px); color:#3a3a3a; padding:0 6%;
  pointer-events:none; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.frame-washi{ box-shadow:0 8px 18px rgba(0,0,0,0.4); border-radius:5px; }
.washi-tape{
  position:absolute; top:-8%; left:50%; transform:translateX(-50%) rotate(-4deg);
  width:46%; height:16%; opacity:0.88; border-radius:2px; z-index:2; pointer-events:none;
  background:repeating-linear-gradient(45deg, var(--amber), var(--amber) 6px, rgba(255,255,255,0.18) 6px, rgba(255,255,255,0.18) 12px);
  box-shadow:0 2px 6px rgba(0,0,0,0.25);
}
.board-caption-tag{
  position:absolute; bottom:-9%; left:0; right:0; text-align:center;
  font-family:var(--font-mono); font-size:min(2.6vw,10px); color:var(--ink-faint);
  pointer-events:none; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.board-sticker{ display:flex; align-items:center; justify-content:center; }
.sticker-emoji{ font-size:min(9vw, 56px); line-height:1; width:100%; text-align:center; pointer-events:none; }
.board-text-item{
  display:flex; align-items:center; justify-content:center; padding:10%;
  background:var(--surface-2); border:1px solid var(--line-strong); border-radius:10px;
  box-shadow:0 6px 16px rgba(0,0,0,0.3);
}
.board-text-content{
  font-family:var(--font-display); font-weight:600; font-size:min(3.6vw,15px); text-align:center; color:var(--ink);
  overflow-wrap:break-word; pointer-events:none; line-height:1.35;
}
.board-goal-badge{
  position:absolute; top:-8px; left:-8px; background:var(--green); color:var(--bg);
  font-family:var(--font-mono); font-size:9px; font-weight:700; padding:2px 6px; border-radius:10px;
  pointer-events:none; white-space:nowrap; max-width:120%; overflow:hidden; text-overflow:ellipsis; z-index:3;
}
.resize-handle{
  position:absolute; right:-9px; bottom:-9px; width:20px; height:20px;
  background:var(--ink); border-radius:50%; border:2px solid var(--bg);
  cursor:nwse-resize; display:none; z-index:4;
}
.rotate-handle{
  position:absolute; left:50%; top:-30px; width:18px; height:18px;
  background:var(--green); border-radius:50%; border:2px solid var(--bg);
  transform:translateX(-50%); cursor:grab; display:none; z-index:4;
}
.board-item.selected .resize-handle, .board-item.selected .rotate-handle{ display:block; }
.board-toolbar{
  position:fixed; bottom:calc(78px + var(--safe-bottom)); left:50%; transform:translateX(-50%);
  display:flex; gap:6px; background:var(--surface-2); border:1px solid var(--line-strong);
  border-radius:30px; padding:8px 9px; box-shadow:0 10px 24px rgba(0,0,0,0.45); z-index:60;
}
.board-tool-btn{
  width:36px; height:36px; border-radius:50%; border:none; background:var(--surface-3);
  color:var(--ink); font-size:15px; display:flex; align-items:center; justify-content:center; cursor:pointer;
}
.board-tool-btn.danger{ color:var(--red); }
.board-emoji-btn{ font-size:19px !important; padding:8px 11px !important; }

/* ============ PIN LOCK ============ */
#lock-root{
  display:none; position:fixed; inset:0; z-index:90; background:var(--bg);
  align-items:center; justify-content:center;
}
.lock-screen{ display:flex; flex-direction:column; align-items:center; gap:18px; padding:24px; width:100%; max-width:340px; }
.lock-stamp{ width:56px; height:56px; border:2px solid var(--line-strong); border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:22px; color:var(--green); }
.lock-title{ font-family:var(--font-display); font-size:18px; font-weight:700; }
.lock-dots{ display:flex; gap:14px; }
.lock-dot{ width:14px; height:14px; border-radius:50%; border:1.5px solid var(--line-strong); }
.lock-dot.filled{ background:var(--ink); border-color:var(--ink); }
.lock-error{ font-size:12px; color:var(--red); font-family:var(--font-mono); height:16px; }
.lock-keypad{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; width:100%; max-width:260px; }
.lock-key{ aspect-ratio:1; border-radius:50%; border:1px solid var(--line-strong); background:var(--surface); color:var(--ink); font-size:20px; font-family:var(--font-mono); cursor:pointer; }
.lock-key:active{ background:var(--surface-3); }
.lock-forgot{ background:none; border:none; color:var(--ink-faint); font-family:var(--font-mono); font-size:12px; cursor:pointer; margin-top:6px; }

/* ============ CALENDAR HEATMAP ============ */
.heat-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.heat-cell{ aspect-ratio:1; border-radius:3px; background:var(--surface-3); cursor:pointer; }
.heat-cell.empty{ background:transparent; cursor:default; }
.heat-cell.level-1{ background:var(--amber-dim); }
.heat-cell.level-2{ background:var(--amber); opacity:0.75; }
.heat-cell.level-3{ background:var(--red); }
.heat-legend{ display:flex; align-items:center; gap:6px; margin-top:10px; font-size:10.5px; color:var(--ink-faint); font-family:var(--font-mono); }
.heat-legend span.sw{ width:10px; height:10px; border-radius:2px; display:inline-block; }

/* ============ MODAL / SHEET ============ */
.overlay{
  position:fixed; inset:0; background:rgba(8,10,13,0.6);
  display:flex; align-items:flex-end; justify-content:center;
  z-index:100; opacity:0; pointer-events:none;
  transition:opacity 180ms ease;
}
.overlay.open{opacity:1; pointer-events:auto;}
.sheet{
  width:100%; max-width:520px;
  background:var(--surface-2);
  border-radius:20px 20px 0 0;
  border-top:1px solid var(--line-strong);
  padding:18px 20px calc(24px + var(--safe-bottom));
  transform:translateY(100%);
  transition:transform 220ms cubic-bezier(.22,.9,.35,1);
  max-height:88vh;
  overflow-y:auto;
}
.overlay.open .sheet{transform:translateY(0);}
.sheet-handle{width:36px;height:4px;background:var(--line-strong); border-radius:4px; margin:0 auto 16px;}
.sheet-title{font-family:var(--font-display); font-size:17px; font-weight:700; margin-bottom:16px;}
.field-group{margin-bottom:14px;}
.field-label{font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-faint); display:block; margin-bottom:7px;}
.field{
  width:100%;
  background:var(--surface);
  border:1px solid var(--line-strong);
  border-radius:var(--radius-sm);
  padding:12px 13px;
  color:var(--ink);
  font-size:15px;
  outline:none;
}
.field:focus{border-color:var(--green);}
.amount-field{
  display:flex; align-items:center; gap:8px;
  background:var(--surface); border:1px solid var(--line-strong); border-radius:var(--radius-sm);
  padding:12px 13px;
}
.amount-field:focus-within{border-color:var(--green);}
.amount-field .cur{font-family:var(--font-mono); color:var(--ink-faint); font-size:16px;}
.cur-select{
  background:none; border:none; color:var(--ink-faint); font-family:var(--font-mono);
  font-size:13px; outline:none; -webkit-appearance:none; appearance:none; padding-right:2px;
}
.amount-field input{
  border:none; background:none; outline:none; color:var(--ink);
  font-family:var(--font-mono); font-size:22px; font-weight:600; width:100%;
}
.scan-status{
  font-family:var(--font-mono); font-size:11.5px; color:var(--ink-faint);
  text-align:center; margin:10px 0 14px; line-height:1.4;
}
.scan-hint{
  font-size:11px; color:var(--ink-faint); text-align:center; margin:10px 0 16px; line-height:1.4;
}
.segmented{display:flex; background:var(--surface); border:1px solid var(--line-strong); border-radius:var(--radius-sm); padding:3px; margin-bottom:16px;}
.seg-btn{flex:1; text-align:center; padding:9px 0; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; color:var(--ink-faint); background:none; border:none;}
.seg-btn.active.income{background:var(--green-dim); color:var(--green);}
.seg-btn.active.expense{background:var(--red-dim); color:var(--red);}
.cat-chip-grid{display:flex; flex-wrap:wrap; gap:8px;}
.cat-chip{
  font-family:var(--font-mono); font-size:12px; padding:8px 12px; border-radius:20px;
  border:1px solid var(--line-strong); background:var(--surface); color:var(--ink-dim); cursor:pointer;
}
.cat-chip.selected{color:var(--bg); font-weight:600;}

.toast{
  position:fixed; left:50%; transform:translateX(-50%);
  bottom:calc(96px + var(--safe-bottom));
  background:var(--ink); color:var(--bg);
  font-size:13px; font-weight:600;
  padding:10px 18px; border-radius:30px;
  z-index:200; opacity:0; transition:opacity 200ms ease, transform 200ms ease;
  pointer-events:none;
  max-width:80%;
  text-align:center;
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(-4px);}

.hairline-btn{
  background:none; border:none; color:var(--ink-faint); font-family:var(--font-mono);
  font-size:12px; cursor:pointer; padding:0;
}
</style>
</head>

<script>
/* =========================================================================
   LEDGER: private, on-device income & expense tracker
   All data lives in IndexedDB in this browser profile. Nothing is sent
   anywhere. There is no account, no server, no analytics.
   ========================================================================= */

/* ---------- tiny IndexedDB wrapper ---------- */
const DB_NAME = 'ledgerDB';
const DB_VERSION = 5;
let dbPromise = null;

function openDB(){
  if(dbPromise) return dbPromise;
  dbPromise = new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if(!db.objectStoreNames.contains('transactions')){
        const s = db.createObjectStore('transactions', { keyPath:'id', autoIncrement:true });
        s.createIndex('date','date',{unique:false});
        s.createIndex('category','category',{unique:false});
        s.createIndex('type','type',{unique:false});
      }
      if(!db.objectStoreNames.contains('categories')){
        db.createObjectStore('categories', { keyPath:'id', autoIncrement:true });
      }
      if(!db.objectStoreNames.contains('meta')){
        db.createObjectStore('meta', { keyPath:'key' });
      }
      if(!db.objectStoreNames.contains('goals')){
        db.createObjectStore('goals', { keyPath:'id', autoIncrement:true });
      }
      if(!db.objectStoreNames.contains('accounts')){
        db.createObjectStore('accounts', { keyPath:'id', autoIncrement:true });
      }
      if(!db.objectStoreNames.contains('recurring')){
        db.createObjectStore('recurring', { keyPath:'id', autoIncrement:true });
      }
      if(!db.objectStoreNames.contains('boardItems')){
        db.createObjectStore('boardItems', { keyPath:'id', autoIncrement:true });
      }
      if(!db.objectStoreNames.contains('netWorthSnapshots')){
        db.createObjectStore('netWorthSnapshots', { keyPath:'date' });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  return dbPromise;
}
function tx(storeNames, mode){
  return openDB().then(db => db.transaction(storeNames, mode));
}
function reqToPromise(req){
  return new Promise((resolve,reject)=>{ req.onsuccess=()=>resolve(req.result); req.onerror=()=>reject(req.error); });
}
async function dbGetAll(store){
  const t = await tx([store],'readonly');
  return reqToPromise(t.objectStore(store).getAll());
}
async function dbGet(store,key){
  const t = await tx([store],'readonly');
  return reqToPromise(t.objectStore(store).get(key));
}
async function dbPut(store,val){
  const t = await tx([store],'readwrite');
  return reqToPromise(t.objectStore(store).put(val));
}
async function dbAdd(store,val){
  const t = await tx([store],'readwrite');
  return reqToPromise(t.objectStore(store).add(val));
}
async function dbDelete(store,key){
  const t = await tx([store],'readwrite');
  return reqToPromise(t.objectStore(store).delete(key));
}
async function dbClear(store){
  const t = await tx([store],'readwrite');
  return reqToPromise(t.objectStore(store).clear());
}

/* ---------- seed data ---------- */
const DEFAULT_CATEGORIES = [
  {name:'Salary', type:'income', color:'#4B8B6B', budget:null},
  {name:'Freelance', type:'income', color:'#5B8A72', budget:null},
  {name:'Venture Income', type:'income', color:'#3E7C63', budget:null},
  {name:'Investment', type:'income', color:'#6B9C7D', budget:null},
  {name:'Other Income', type:'income', color:'#7FAE8E', budget:null},
  {name:'Food & Drink', type:'expense', color:'#C1443C', budget:null},
  {name:'Transport', type:'expense', color:'#C98A3B', budget:null},
  {name:'Bills & Utilities', type:'expense', color:'#B0555A', budget:null},
  {name:'Shopping', type:'expense', color:'#A6577E', budget:null},
  {name:'Health', type:'expense', color:'#8A5FA6', budget:null},
  {name:'Entertainment', type:'expense', color:'#4E7DA6', budget:null},
  {name:'Business & Ventures', type:'expense', color:'#3E8C8C', budget:null},
  {name:'Charms & Shrines', type:'expense', color:'#C9A23B', budget:null},
  {name:'Travel', type:'expense', color:'#5A76B0', budget:null},
  {name:'Other', type:'expense', color:'#8B93A0', budget:null},
];
const CURRENCIES = {
  THB:{symbol:'฿', code:'THB'},
  USD:{symbol:'$', code:'USD'},
  EUR:{symbol:'€', code:'EUR'},
  GBP:{symbol:'£', code:'GBP'},
  JPY:{symbol:'¥', code:'JPY'},
  CNY:{symbol:'¥', code:'CNY'},
  SGD:{symbol:'S$', code:'SGD'},
  AUD:{symbol:'A$', code:'AUD'},
  HKD:{symbol:'HK$', code:'HKD'},
};
const DEFAULT_ACCOUNTS = [
  {name:'Cash', color:'#C98A3B', startingBalance:0, archived:false},
  {name:'Bank', color:'#4E7DA6', startingBalance:0, archived:false},
];

/* ---------- palettes (recolors only: layout, fonts, and structure stay identical) ---------- */
const THEMES = {
  ledger:{
    label:'Ledger', bg:'#262B31', surface:'#2F353D', surface2:'#383F48', surface3:'#434B56',
    ink:'#E7E2D3', inkDim:'#9CA4B0', inkFaint:'#727B87', green:'#5B9C79', red:'#CC584F', amber:'#D69A4C'
  },
  midnight:{
    label:'Midnight', bg:'#1F2A40', surface:'#27334D', surface2:'#303F5C', surface3:'#3A4B6C',
    ink:'#E2EAF6', inkDim:'#96A4BE', inkFaint:'#6C7B96', green:'#4FB08B', red:'#E9685F', amber:'#E7B558'
  },
  botanical:{
    label:'Botanical', bg:'#212B25', surface:'#29352D', surface2:'#334036', surface3:'#3E4C41',
    ink:'#EAEFE2', inkDim:'#9DAD98', inkFaint:'#71816D', green:'#8ABB6C', red:'#D06B4F', amber:'#DDAD57'
  },
  plum:{
    label:'Vintage Plum', bg:'#2B2130', surface:'#35283B', surface2:'#402F47', surface3:'#4C3955',
    ink:'#F2E8EE', inkDim:'#B79BAF', inkFaint:'#856881', green:'#5EAA85', red:'#DB5C74', amber:'#D69A5A'
  },
};
function hexToRgba(hex, alpha){
  const h = hex.replace('#','');
  const r = parseInt(h.substring(0,2),16), g = parseInt(h.substring(2,4),16), b = parseInt(h.substring(4,6),16);
  return `rgba(${r},${g},${b},${alpha})`;
}
function applyTheme(key){
  const t = THEMES[key] || THEMES.ledger;
  const root = document.documentElement.style;
  root.setProperty('--bg', t.bg);
  root.setProperty('--surface', t.surface);
  root.setProperty('--surface-2', t.surface2);
  root.setProperty('--surface-3', t.surface3);
  root.setProperty('--paper', t.ink);
  root.setProperty('--ink', t.ink);
  root.setProperty('--ink-dim', t.inkDim);
  root.setProperty('--ink-faint', t.inkFaint);
  root.setProperty('--green', t.green);
  root.setProperty('--green-dim', hexToRgba(t.green,0.16));
  root.setProperty('--red', t.red);
  root.setProperty('--red-dim', hexToRgba(t.red,0.16));
  root.setProperty('--amber', t.amber);
  root.setProperty('--amber-dim', hexToRgba(t.amber,0.16));
  root.setProperty('--line', hexToRgba(t.ink,0.13));
  root.setProperty('--line-strong', hexToRgba(t.ink,0.24));
  const metaTheme = document.querySelector('meta[name="theme-color"]');
  if(metaTheme) metaTheme.setAttribute('content', t.bg);
  state.theme = key;
}

async function ensureSeed(){
  const cats = await dbGetAll('categories');
  if(cats.length === 0){
    for(const c of DEFAULT_CATEGORIES){ await dbAdd('categories', c); }
  }
  const curMeta = await dbGet('meta','currency');
  if(!curMeta){ await dbPut('meta', {key:'currency', value:'THB'}); }
  const themeMeta = await dbGet('meta','theme');
  if(!themeMeta){ await dbPut('meta', {key:'theme', value:'ledger'}); }
  const accts = await dbGetAll('accounts');
  if(accts.length === 0){
    for(const a of DEFAULT_ACCOUNTS){ await dbAdd('accounts', a); }
  }
  // Migrate pre-existing transactions (from before accounts existed) onto the first account.
  const firstAccount = (await dbGetAll('accounts'))[0];
  if(firstAccount){
    const allTxns = await dbGetAll('transactions');
    for(const t of allTxns){
      if(t.accountId == null){ t.accountId = firstAccount.id; await dbPut('transactions', t); }
    }
  }
}

/* ---------- app state ---------- */
const state = {
  tab: 'dashboard',
  month: monthKeyOf(ymd(new Date())),
  ledgerFilter: 'all',       // all | income | expense
  ledgerCategory: 'all',
  ledgerAccount: 'all',
  ledgerSearch: '',
  analyticsRange: 6,
  analyticsAccount: 'all',
  analyticsSlice: 'category',   // category | account | currency | weekday
  currency: CURRENCIES.THB,
  categories: [],
  accounts: [],
  pendingRecurring: [],
  boardSelectedId: null,
  theme: 'ledger',
};

/* ---------- date / format helpers ---------- */
function pad2(n){ return n<10 ? '0'+n : ''+n; }
function ymd(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function monthKeyOf(dateStr){ return dateStr.slice(0,7); }
function monthLabel(key){
  const [y,m] = key.split('-').map(Number);
  return new Date(y,m-1,1).toLocaleString('en-US',{month:'short', year:'numeric'});
}
function addMonths(key,delta){
  const [y,m] = key.split('-').map(Number);
  const d = new Date(y, m-1+delta, 1);
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}`;
}
function lastNMonthKeys(n, endKey){
  const out = [];
  for(let i=n-1;i>=0;i--) out.push(addMonths(endKey,-i));
  return out;
}
function daysInMonth(key){
  const [y,m] = key.split('-').map(Number);
  return new Date(y,m,0).getDate();
}
function dayLabel(dateStr){
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleString('en-US',{weekday:'short', day:'numeric', month:'short'});
}
function fmtMoney(n){
  const sign = n < 0 ? '−' : '';
  const abs = Math.abs(n);
  return sign + state.currency.symbol + abs.toLocaleString('en-US',{minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtCompact(n){
  const sign = n < 0 ? '−' : '';
  const abs = Math.abs(n);
  if(abs >= 1000000) return sign + state.currency.symbol + (abs/1000000).toFixed(1) + 'M';
  if(abs >= 1000) return sign + state.currency.symbol + (abs/1000).toFixed(1) + 'k';
  return sign + state.currency.symbol + abs.toFixed(0);
}
function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function catByName(name){ return state.categories.find(c => c.name === name); }
function catColor(name){ const c = catByName(name); return c ? c.color : '#8B93A0'; }
function accountById(id){ return state.accounts.find(a => a.id === id); }
function txnValue(t){ return (typeof t.baseAmount === 'number') ? t.baseAmount : t.amount; }

function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=> el.classList.remove('show'), 1800);
}

/* ---------- data queries ---------- */
async function getAllTransactions(){
  const list = await dbGetAll('transactions');
  return list.sort((a,b) => (b.date+String(b.id).padStart(10,'0')).localeCompare(a.date+String(a.id).padStart(10,'0')));
}
async function getTransactionsForMonth(key){
  const all = await getAllTransactions();
  return all.filter(t => monthKeyOf(t.date) === key);
}
async function monthTotals(key){
  const txns = await getTransactionsForMonth(key);
  let income=0, expense=0;
  for(const t of txns){
    if(t.type==='income') income += txnValue(t);
    else if(t.type==='expense') expense += txnValue(t);
  }
  return { income, expense, net: income-expense, txns };
}
async function categoryBreakdown(txns, type='expense'){
  const map = {};
  let total = 0;
  for(const t of txns){
    if(t.type !== type) continue;
    const val = txnValue(t);
    map[t.category] = (map[t.category]||0) + val;
    total += val;
  }
  const rows = Object.entries(map).map(([name,value]) => ({name, value, pct: total? (value/total*100):0}));
  rows.sort((a,b)=> b.value - a.value);
  return { rows, total };
}
function computeAccountBalance(accountId, allTxns){
  const acct = accountById(accountId);
  let bal = acct ? (acct.startingBalance||0) : 0;
  for(const t of allTxns){
    if(t.type === 'transfer'){
      if(t.fromAccountId === accountId) bal -= t.amount;
      if(t.toAccountId === accountId) bal += t.amount;
    } else if(t.accountId === accountId){
      if(t.type === 'income') bal += txnValue(t);
      else if(t.type === 'expense') bal -= txnValue(t);
    }
  }
  return bal;
}
// For categories with rollover enabled: unused budget carries forward (and overspend
// shrinks next month's budget). Looks back up to 12 months to bound the computation.
function effectiveBudgetForMonth(cat, monthKey, allTxns){
  if(!cat.rollover || !cat.budget) return cat.budget;
  let carry = 0;
  const stopKey = addMonths(monthKey, -12);
  let k = addMonths(monthKey, -1);
  while(k >= stopKey){
    const monthHasActivity = allTxns.some(t => monthKeyOf(t.date) === k);
    if(!monthHasActivity) break; // stop once we reach a month before any recorded activity
    const spent = allTxns.filter(t => t.type==='expense' && t.category===cat.name && monthKeyOf(t.date)===k).reduce((s,t)=>s+txnValue(t),0);
    carry += (cat.budget - spent);
    k = addMonths(k, -1);
  }
  return cat.budget + carry;
}

/* ---------- PIN lock ---------- */
async function hashText(text){
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function getPinHash(){ const m = await dbGet('meta','pinHash'); return m ? m.value : null; }

function renderLockScreen(onSuccess){
  const root = document.getElementById('lock-root');
  let entered = '';
  let busy = false;

  async function checkPin(){
    busy = true;
    const hash = await hashText(entered);
    const stored = await getPinHash();
    if(hash === stored){
      root.innerHTML = '';
      root.style.display = 'none';
      onSuccess();
    } else {
      entered = '';
      busy = false;
      draw(true);
    }
  }

  function draw(error){
    root.style.display = 'flex';
    root.innerHTML = `
      <div class="lock-screen">
        <div class="lock-stamp">${state.currency.symbol}</div>
        <div class="lock-title">Enter your PIN</div>
        <div class="lock-dots">${Array.from({length:4}).map((_,i)=>`<span class="lock-dot ${i<entered.length?'filled':''}"></span>`).join('')}</div>
        <div class="lock-error" style="visibility:${error?'visible':'hidden'};">Incorrect PIN, try again</div>
        <div class="lock-keypad">
          ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="lock-key" data-key="${n}">${n}</button>`).join('')}
          <div></div>
          <button class="lock-key" data-key="0">0</button>
          <button class="lock-key" data-key="back">⌫</button>
        </div>
        <button class="lock-forgot" id="lock-forgot">Forgot PIN?</button>
      </div>
    `;
    root.querySelectorAll('[data-key]').forEach(btn => {
      btn.addEventListener('click', () => {
        if(busy) return;
        const k = btn.dataset.key;
        if(k === 'back'){ entered = entered.slice(0,-1); draw(false); return; }
        if(entered.length < 4) entered += k;
        draw(false);
        if(entered.length === 4) checkPin();
      });
    });
    document.getElementById('lock-forgot').addEventListener('click', () => {
      openConfirm("Resetting erases every transaction, category, account, goal, and board photo on this device. That's the only way back in without the PIN. Continue?", async () => {
        await dbClear('transactions'); await dbClear('categories'); await dbClear('meta');
        await dbClear('accounts'); await dbClear('recurring'); await dbClear('goals'); await dbClear('boardItems');
        location.reload();
      }, true);
    });
  }
  draw(false);
}

/* ---------- recurring transactions ---------- */
function advanceDueDate(dateStr, frequency){
  const d = new Date(dateStr+'T00:00:00');
  if(frequency==='weekly'){ d.setDate(d.getDate()+7); return ymd(d); }
  if(frequency==='yearly'){ d.setFullYear(d.getFullYear()+1); return ymd(d); }
  // monthly: clamp to the last valid day of the target month (e.g. Jan 31 -> Feb 28, not Mar 3)
  const origDay = d.getDate();
  let newMonth = d.getMonth()+1, newYear = d.getFullYear();
  if(newMonth > 11){ newMonth = 0; newYear++; }
  const daysInNewMonth = new Date(newYear, newMonth+1, 0).getDate();
  return ymd(new Date(newYear, newMonth, Math.min(origDay, daysInNewMonth)));
}
async function saveRecurring(rule){

  else { await dbAdd('recurring', rule); }

// Runs at boot: silently posts anything due whose rule is set to auto-post
// (catching up if the app wasn't opened for a while), and queues anything
// that needs a manual confirm/skip into state.pendingRecurring.
async function processRecurring(){
  const rules = await dbGetAll('recurring');
  const today = ymd(new Date());
  const pending = [];
  for(const rule of rules){
    if(!rule.active) continue;
    if(rule.autoPost){
      let guard = 0;
      while(rule.nextDueDate <= today && guard < 24){
        await saveTransaction({
          type: rule.type, amount: rule.amount, category: rule.category,
          accountId: rule.accountId, note: rule.note || '', date: rule.nextDueDate,
          currency: state.currency.code, fxRate: 1, baseAmount: rule.amount,
          createdAt: Date.now(),
        });
        rule.lastPostedDate = rule.nextDueDate;
        rule.nextDueDate = advanceDueDate(rule.nextDueDate, rule.frequency);
        guard++;
      }
      await dbPut('recurring', rule);
    } else if(rule.nextDueDate <= today){
      pending.push(rule);
    }
  }
  state.pendingRecurring = pending;
}
async function confirmRecurring(id){
  const rule = await dbGet('recurring', id);
  if(!rule) return;
  await saveTransaction({
    type: rule.type, amount: rule.amount, category: rule.category,
    accountId: rule.accountId, note: rule.note || '', date: rule.nextDueDate,
    currency: state.currency.code, fxRate: 1, baseAmount: rule.amount,
    createdAt: Date.now(),
  });
  rule.lastPostedDate = rule.nextDueDate;
  rule.nextDueDate = advanceDueDate(rule.nextDueDate, rule.frequency);
  await dbPut('recurring', rule);
  state.pendingRecurring = state.pendingRecurring.filter(r => r.id !== id);
}
async function skipRecurring(id){
  const rule = await dbGet('recurring', id);
  if(!rule) return;
  rule.nextDueDate = advanceDueDate(rule.nextDueDate, rule.frequency);
  await dbPut('recurring', rule);
  state.pendingRecurring = state.pendingRecurring.filter(r => r.id !== id);
}

/* ---------- multi-currency: live exchange rate lookup ---------- */
async function fetchFxRate(fromCode, toCode){
  if(fromCode === toCode) return 1;
  const cacheKey = `fx_${fromCode}_${toCode}`;
  try{
    const res = await fetch(`https://api.frankfurter.app/latest?amount=1&from=${fromCode}&to=${toCode}`);
    if(!res.ok) throw new Error('rate lookup failed');
    const data = await res.json();
    const rate = data.rates && data.rates[toCode];
    if(!rate) throw new Error('no rate in response');
    await dbPut('meta', {key:cacheKey, value:rate});
    return rate;
  }catch(err){
    const cached = await dbGet('meta', cacheKey);
    if(cached) return cached.value;
    throw err;
  }
}

function sparkline(values){
  const w = 300, h = 56, pad = 6;
  const min = Math.min(...values, 0), max = Math.max(...values, 0);
  const range = (max - min) || 1;
  const n = values.length;
  const pts = values.map((v,i) => {
    const x = n>1 ? (i/(n-1))*(w-pad*2)+pad : w/2;
    const y = h - pad - ((v-min)/range)*(h-pad*2);
    return [x,y];
  });
  const path = pts.map((p,i)=> (i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const zeroY = h - pad - ((0-min)/range)*(h-pad*2);
  const dots = pts.map((p,i)=> `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="${i===pts.length-1?3.5:2.5}" fill="${values[i]>=0?'var(--green)':'var(--red)'}"/>`).join('');
  return `<div class="spark-wrap"><svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <line x1="0" y1="${zeroY.toFixed(1)}" x2="${w}" y2="${zeroY.toFixed(1)}" stroke="var(--line-strong)" stroke-dasharray="3,3" stroke-width="1"/>
    <path d="${path}" fill="none" stroke="var(--ink-dim)" stroke-width="1.75"/>
    ${dots}
  </svg></div>`;
}

function budgetBarHtml(b){

  const color = over ? 'var(--red)' : (b.pct > 70 ? 'var(--amber)' : 'var(--green)');

    <div class="bar-top">
      <span class="name"><span class="dot" style="background:${b.color}"></span>${escapeHtml(b.name)}${b.rollover?' <span style="color:var(--ink-faint); font-size:10px;">(rolls over)</span>':''}</span>

    </div>
    <div class="bar-track"><div class="bar-fill" style="width:${b.pct}%; background:${color};"></div></div>
  </div>`;

async function renderGoals(){
  const goals = await dbGetAll('goals');
  if(!goals.length){
    return emptyState('◎', "Set a target for what you're building toward: an emergency fund, steady investing, paying down a debt, or just working out where your money should go each month.", 'Set your first goal', 'goal');
  }
  const allTxns = await getAllTransactions();
  const key = monthKeyOf(ymd(new Date()));
  const monthTxns = allTxns.filter(t => monthKeyOf(t.date) === key);
  const monthIncome = monthTxns.filter(t => t.type === 'income').reduce((s,t)=>s+txnValue(t), 0);

  const monthlyGoals = goals.filter(g => g.type === 'monthly');
  const targetGoals = goals.filter(g => g.type === 'target');
  const splitGoals = goals.filter(g => g.type === 'split');
  const debtGoals = goals.filter(g => g.type === 'debt');

  let html = '';
  if(monthlyGoals.length){
    html += `<div class="section-label">Monthly targets</div>`;
    html += monthlyGoals.map(g => goalMonthlyCardHtml(g, computeMonthlyGoalProgress(g, monthTxns))).join('');
  }
  if(targetGoals.length){
    html += `<div class="section-label" style="margin-top:${monthlyGoals.length?'18px':'0'};">Longer-term goals</div>`;
    html += targetGoals.map(g => goalTargetCardHtml(g, computeTargetGoalProgress(g, allTxns))).join('');
  }
  if(splitGoals.length){
    html += `<div class="section-label" style="margin-top:${(monthlyGoals.length||targetGoals.length)?'18px':'0'};">Income split</div>`;
    html += splitGoals.map(g => goalSplitCardHtml(g, computeSplitGoalProgress(g, monthTxns, monthIncome))).join('');
  }
  if(debtGoals.length){
    html += `<div class="section-label" style="margin-top:${(monthlyGoals.length||targetGoals.length||splitGoals.length)?'18px':'0'};">Debt payoff</div>`;
    html += debtGoals.map(g => goalDebtCardHtml(g, computeDebtProgress(g, allTxns))).join('');
  }
  html += `<button class="btn" data-open-add-goal="1" style="margin-top:18px;">+ Add another goal</button>`;
  return html;
}

function computeMonthlyGoalProgress(g, monthTxns){
  const manual = monthTxns.filter(t => (g.linkedCategories||[]).includes(t.category)).reduce((s,t)=>s+txnValue(t), 0);
  let auto = 0;
  if(g.autoTrack){
    const income = monthTxns.filter(t=>t.type==='income').reduce((s,t)=>s+txnValue(t),0);
    const expense = monthTxns.filter(t=>t.type==='expense').reduce((s,t)=>s+txnValue(t),0);
    auto = Math.max(0, income-expense) * (g.autoSharePct||0)/100;
  }
  const current = manual + auto;
  const pct = g.targetAmount ? (current/g.targetAmount*100) : 0;
  return { current, target: g.targetAmount||0, pct };
}

function computeTargetGoalProgress(g, allTxns){
  const start = g.startDate || ymd(new Date());
  const manual = allTxns.filter(t => t.date >= start && (g.linkedCategories||[]).includes(t.category)).reduce((s,t)=>s+txnValue(t), 0);
  let auto = 0;
  if(g.autoTrack){
    let k = monthKeyOf(start);
    const nowKey = monthKeyOf(ymd(new Date()));
    let guard = 0;
    while(guard < 600){
      const mTxns = allTxns.filter(t => monthKeyOf(t.date) === k);
      const income = mTxns.filter(t=>t.type==='income').reduce((s,t)=>s+txnValue(t),0);
      const expense = mTxns.filter(t=>t.type==='expense').reduce((s,t)=>s+txnValue(t),0);
      auto += Math.max(0, income-expense) * (g.autoSharePct||0)/100;
      if(k === nowKey) break;
      k = addMonths(k,1);
      guard++;
    }
  }
  const current = manual + auto;
  const pct = g.targetAmount ? (current/g.targetAmount*100) : 0;
  let pace = null;
  if(g.targetDate){
    const today = new Date();
    const target = new Date(g.targetDate+'T00:00:00');
    const msPerMonth = 1000*60*60*24*30.44;
    const monthsLeft = Math.max(0, (target-today)/msPerMonth);
    const remaining = Math.max(0, g.targetAmount-current);
    const requiredMonthly = monthsLeft > 0.1 ? remaining/monthsLeft : remaining;
    pace = { monthsLeft: Math.ceil(monthsLeft), requiredMonthly, remaining, overdue: target < today && current < g.targetAmount };
  }
  return { current, target: g.targetAmount||0, pct, pace };
}

function computeSplitGoalProgress(g, monthTxns, income){
  const expenseByCat = {};
  monthTxns.filter(t=>t.type==='expense').forEach(t => { expenseByCat[t.category] = (expenseByCat[t.category]||0) + t.amount; });
  const assignments = g.categoryAssignments || {};
  const buckets = (g.buckets||[]).map((b,i) => {
    const cats = Object.entries(assignments).filter(([c,idx]) => idx === i).map(([c]) => c);
    const actualFromCats = cats.reduce((s,c) => s + (expenseByCat[c]||0), 0);
    return { ...b, cats, actualFromCats };
  });
  const assignedTotal = buckets.reduce((s,b) => s + b.actualFromCats, 0);
  const leftover = Math.max(0, income - assignedTotal);
  const noCatBuckets = buckets.filter(b => b.cats.length === 0);
  const finalBuckets = buckets.map(b => {
    const actual = b.cats.length > 0 ? b.actualFromCats : (noCatBuckets.length ? leftover/noCatBuckets.length : 0);
    const targetAmt = income * (b.pct||0) / 100;
    return { ...b, actual, targetAmt };
  });
  return { income, buckets: finalBuckets };
}

function computeDebtProgress(g, allTxns){
  const start = g.startDate || ymd(new Date());
  const paid = allTxns.filter(t => t.date >= start && t.type==='expense' && (g.linkedCategories||[]).includes(t.category)).reduce((s,t)=>s+txnValue(t), 0);

  const pct = g.principal ? (paid/g.principal*100) : 0;
  return { paid, remaining, pct, principal: g.principal||0 };
}

function resizeImageFile(file, maxDim){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('read failed'));
    reader.onload = (e) => {
      const img = new Image();
      img.onerror = () => reject(new Error('decode failed'));
      img.onload = () => {
        let { width, height } = img;
        if(width > height && width > maxDim){ height = height*maxDim/width; width = maxDim; }
        else if(height >= width && height > maxDim){ width = width*maxDim/height; height = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(width); canvas.height = Math.round(height);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.82));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// Custom single-pointer drag / resize / rotate for board items. Positions are
// stored as percentages of the canvas so the board scales across screen sizes.
function attachBoardInteraction(){
  const canvas = document.getElementById('board-canvas');
  if(!canvas) return;

  canvas.addEventListener('pointerdown', (e) => {
    const itemEl = e.target.closest('.board-item');
    if(!itemEl){
      if(state.boardSelectedId !== null){ state.boardSelectedId = null; renderView(); }
      return;
    }
    e.preventDefault();
    const id = parseInt(itemEl.dataset.boarditem, 10);
    const item = boardItemsCache.find(x => x.id === id);
    if(!item) return;

    if(state.boardSelectedId !== id){
      state.boardSelectedId = id;
      canvas.querySelectorAll('.board-item.selected').forEach(el=>el.classList.remove('selected'));
      itemEl.classList.add('selected');
      const bar = document.getElementById('board-toolbar');
      if(bar) bar.style.display = 'flex';
    }

    const rect = canvas.getBoundingClientRect();
    let mode = 'move';
    if(e.target.classList.contains('resize-handle')) mode = 'resize';
    else if(e.target.classList.contains('rotate-handle')) mode = 'rotate';

    boardDragState = {
      id, mode, itemEl, canvasRect: rect,
      startClientX: e.clientX, startClientY: e.clientY,
      startItem: { x:item.x, y:item.y, width:item.width, height:item.height, rotation:item.rotation||0 },
    };
    try{ itemEl.setPointerCapture(e.pointerId); }catch(err){}
  });

  canvas.addEventListener('pointermove', (e) => {
    if(!boardDragState) return;
    const { mode, itemEl, canvasRect, startClientX, startClientY, startItem } = boardDragState;
    const dxPct = (e.clientX - startClientX) / canvasRect.width * 100;
    const dyPct = (e.clientY - startClientY) / canvasRect.height * 100;

    if(mode === 'move'){
      const newX = Math.max(-15, Math.min(95, startItem.x + dxPct));
      const newY = Math.max(-15, Math.min(95, startItem.y + dyPct));
      itemEl.style.left = newX + '%'; itemEl.style.top = newY + '%';
      boardDragState.liveX = newX; boardDragState.liveY = newY;
    } else if(mode === 'resize'){
      const newW = Math.max(8, Math.min(95, startItem.width + dxPct));
      const newH = Math.max(8, Math.min(95, startItem.height + dyPct));
      itemEl.style.width = newW + '%'; itemEl.style.height = newH + '%';
      boardDragState.liveW = newW; boardDragState.liveH = newH;
    } else if(mode === 'rotate'){
      const centerX = canvasRect.left + (startItem.x/100)*canvasRect.width + (startItem.width/100)*canvasRect.width/2;
      const centerY = canvasRect.top + (startItem.y/100)*canvasRect.height + (startItem.height/100)*canvasRect.height/2;
      const angle = Math.atan2(e.clientY - centerY, e.clientX - centerX) * 180/Math.PI + 90;
      itemEl.style.transform = `rotate(${angle}deg)`;
      boardDragState.liveRotation = angle;
    }
  });

  async function finishDrag(){
    if(!boardDragState) return;
    const { id, mode } = boardDragState;
    const item = boardItemsCache.find(x => x.id === id);
    if(item){
      if(mode==='move' && boardDragState.liveX!=null){ item.x = boardDragState.liveX; item.y = boardDragState.liveY; }
      if(mode==='resize' && boardDragState.liveW!=null){ item.width = boardDragState.liveW; item.height = boardDragState.liveH; }
      if(mode==='rotate' && boardDragState.liveRotation!=null){ item.rotation = boardDragState.liveRotation; }
      await dbPut('boardItems', item);
    }
    boardDragState = null;
  }
  canvas.addEventListener('pointerup', finishDrag);
  canvas.addEventListener('pointercancel', () => { boardDragState = null; });
}

/* ---------- analytics helpers ---------- */
async function monthTotalsForAnalytics(key, accountFilter){
  let txns = await getTransactionsForMonth(key);
  if(accountFilter && accountFilter !== 'all'){
    const id = parseInt(accountFilter,10);
    txns = txns.filter(t => t.accountId === id);
  }
  let income=0, expense=0;
  for(const t of txns){
    if(t.type==='income') income += txnValue(t);
    else if(t.type==='expense') expense += txnValue(t);
  }
  return { income, expense, net: income-expense, txns };
}
function hashColor(str){
  let h = 0;
  for(let i=0;i<str.length;i++){ h = (h*31 + str.charCodeAt(i)) >>> 0; }
  const palette = ['#4E7DA6','#A6577E','#3E8C8C','#C98A3B','#8A5FA6','#5A76B0','#6B9C7D','#C9A23B'];
  return palette[h % palette.length];
}
function sliceColor(sliceBy, name){
  if(sliceBy === 'category') return catColor(name);
  if(sliceBy === 'account'){ const a = state.accounts.find(x=>x.name===name); return a ? a.color : '#8B93A0'; }
  if(sliceBy === 'weekday') return 'var(--amber)';
  return hashColor(name); // currency
}
function breakdownBy(txns, sliceBy){
  const map = {};
  let total = 0;
  for(const t of txns){
    if(t.type !== 'expense') continue;
    let key;
    if(sliceBy === 'account') key = accountById(t.accountId) ? accountById(t.accountId).name : 'Unassigned';
    else if(sliceBy === 'currency') key = t.currency || state.currency.code;
    else if(sliceBy === 'weekday') key = new Date(t.date+'T00:00:00').toLocaleDateString('en-US',{weekday:'short'});
    else key = t.category;
    const val = txnValue(t);
    map[key] = (map[key]||0) + val;
    total += val;
  }
  let rows = Object.entries(map).map(([name,value]) => ({name, value, pct: total ? (value/total*100) : 0}));
  if(sliceBy === 'weekday'){
    const order = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    rows.sort((a,b) => order.indexOf(a.name) - order.indexOf(b.name));
  } else {
    rows.sort((a,b) => b.value - a.value);
  }
  return { rows, total };
}
function topTransactionsList(txns, n){
  return txns.filter(t => t.type !== 'transfer').slice().sort((a,b) => txnValue(b) - txnValue(a)).slice(0, n);
}
async function generateInsights(ctx){
  const insights = [];

  // Category momentum: this month vs the average of prior months in range.
  const monthCatTotals = {};
  for(const m of ctx.months){
    const { rows } = await categoryBreakdown(m.txns, 'expense');
    monthCatTotals[m.key] = Object.fromEntries(rows.map(r => [r.name, r.value]));
  }
  const thisCats = monthCatTotals[ctx.thisMonthKey] || {};
  const prevKeys = ctx.months.slice(0,-1).map(m => m.key);
  let bestIncrease = null, bestDecrease = null;
  if(prevKeys.length){
    for(const [cat, val] of Object.entries(thisCats)){
      const prevVals = prevKeys.map(k => (monthCatTotals[k]||{})[cat] || 0);
      const avgPrev = prevVals.reduce((a,b)=>a+b,0) / prevVals.length;
      if(avgPrev > 0){
        const pctChange = (val - avgPrev) / avgPrev * 100;
        if(pctChange >= 20 && (!bestIncrease || pctChange > bestIncrease.pct)) bestIncrease = {cat, pct:pctChange, val, avgPrev};
        if(pctChange <= -20 && (!bestDecrease || pctChange < bestDecrease.pct)) bestDecrease = {cat, pct:pctChange, val, avgPrev};
      }
    }
  }
  if(bestIncrease) insights.push(`🔺 ${escapeHtml(bestIncrease.cat)} is up ${Math.round(bestIncrease.pct)}% vs your recent average: ${fmtCompact(bestIncrease.val)} this month vs ${fmtCompact(bestIncrease.avgPrev)} usually.`);
  if(bestDecrease) insights.push(`🔻 ${escapeHtml(bestDecrease.cat)} is down ${Math.round(Math.abs(bestDecrease.pct))}% vs your recent average, nice work.`);

  // Biggest single expense this month.
  const expensesThisMonth = ctx.thisMonthTxns.filter(t => t.type === 'expense');
  if(expensesThisMonth.length){
    const biggest = expensesThisMonth.slice().sort((a,b) => txnValue(b)-txnValue(a))[0];
    insights.push(`💸 Biggest expense this month: ${fmtCompact(txnValue(biggest))} on ${escapeHtml(biggest.category)}${biggest.note ? ', ' + escapeHtml(biggest.note) : ''}.`);
  }

  // Weekday pattern across the whole range.
  const { rows: wdRows } = breakdownBy(ctx.rangeTxns, 'weekday');
  if(wdRows.length){
    const busiest = wdRows.slice().sort((a,b)=>b.value-a.value)[0];
    if(busiest.value > 0) insights.push(`📅 You tend to spend the most on ${busiest.name}s.`);
  }

  // Savings rate trend vs the previous month.
  if(ctx.months.length >= 2){
    const thisM = ctx.months[ctx.months.length-1];
    const prevM = ctx.months[ctx.months.length-2];
    const thisRate = thisM.income ? (thisM.income-thisM.expense)/thisM.income*100 : null;
    const prevRate = prevM.income ? (prevM.income-prevM.expense)/prevM.income*100 : null;
    if(thisRate!=null && prevRate!=null){
      const diff = thisRate - prevRate;
      if(Math.abs(diff) >= 5) insights.push(`${diff>0?'📈':'📉'} Savings rate is ${diff>0?'up':'down'} ${Math.abs(diff).toFixed(0)} points vs last month.`);
    }
  }

  // Goal pace callouts.
  for(const g of ctx.goals){
    if(g.type === 'monthly'){
      const p = computeMonthlyGoalProgress(g, ctx.thisMonthTxns);
      if(p.pct >= 100) insights.push(`🎯 "${escapeHtml(g.name)}" target hit for this month.`);
      else if(new Date().getDate() >= 20 && p.pct < 50) insights.push(`⚠️ "${escapeHtml(g.name)}" is behind pace this month (${Math.round(p.pct)}%).`);
    }
  }

  return insights.slice(0,4);
}

function calendarHeatmapHtml(monthKey, txns){
  const [y,m] = monthKey.split('-').map(Number);
  const days = daysInMonth(monthKey);
  const dayTotals = {};
  txns.filter(t => t.type==='expense' && monthKeyOf(t.date)===monthKey).forEach(t => {
    dayTotals[t.date] = (dayTotals[t.date]||0) + txnValue(t);
  });
  const maxDay = Math.max(1, ...Object.values(dayTotals));
  const firstDow = new Date(y, m-1, 1).getDay();
  const leadBlank = (firstDow+6) % 7; // Monday-first index
  let cells = '';
  for(let i=0;i<leadBlank;i++) cells += `<div class="heat-cell empty"></div>`;
  for(let d=1; d<=days; d++){
    const dateStr = `${y}-${pad2(m)}-${pad2(d)}`;
    const val = dayTotals[dateStr] || 0;
    const intensity = val/maxDay;
    let level = 0;
    if(intensity > 0) level = 1;
    if(intensity > 0.33) level = 2;
    if(intensity > 0.66) level = 3;
    cells += `<div class="heat-cell level-${level}" data-heatday="${monthKey}" title="${dateStr}: ${fmtCompact(val)}"></div>`;
  }
  return `<div class="heat-grid">${cells}</div>
    <div class="heat-legend">
      <span>Less</span>
      <span class="sw" style="background:var(--surface-3);"></span>
      <span class="sw" style="background:var(--amber-dim);"></span>
      <span class="sw" style="background:var(--amber); opacity:0.75;"></span>
      <span class="sw" style="background:var(--red);"></span>
      <span>More</span>
    </div>`;
}

/* ---------- ANALYTICS ---------- */
async function renderAnalytics(){
  const key = monthKeyOf(ymd(new Date()));
  const range = state.analyticsRange;
  const keys = lastNMonthKeys(range, key);
  const months = [];
  for(const k of keys){ months.push({key:k, ...(await monthTotalsForAnalytics(k, state.analyticsAccount))}); }

  const maxVal = Math.max(1, ...months.map(m=>Math.max(m.income,m.expense)));
  const totalIncome = months.reduce((s,m)=>s+m.income,0);
  const totalExpense = months.reduce((s,m)=>s+m.expense,0);
  const netSaved = totalIncome - totalExpense;
  const savingsRate = totalIncome ? (netSaved/totalIncome*100) : 0;
  const totalDays = keys.reduce((s,k)=>s + (k===key ? new Date().getDate() : daysInMonth(k)), 0);
  const avgDaily = totalDays ? totalExpense/totalDays : 0;

  const allTxnsInRange = months.flatMap(m => m.txns);
  const thisMonth = months[months.length-1];
  const slice = state.analyticsSlice;
  const { rows: sliceRows } = breakdownBy(allTxnsInRange, slice);
  const maxSlice = sliceRows.length ? sliceRows[0].value : 1;
  const topCategoryRow = breakdownBy(allTxnsInRange, 'category').rows[0];

  const goals = await dbGetAll('goals');
  const insights = await generateInsights({ months, thisMonthTxns: thisMonth.txns, thisMonthKey: thisMonth.key, rangeTxns: allTxnsInRange, goals });
  const biggest = topTransactionsList(allTxnsInRange, 5);

  const budgeted = state.categories.filter(c => c.type==='expense' && c.budget);
  const allTxnsFull = await getAllTransactions();
  const budgetRows = budgeted.map(c => {
    const spent = thisMonth.txns.filter(t => t.type==='expense' && t.category===c.name).reduce((s,t)=>s+txnValue(t),0);
    const effBudget = effectiveBudgetForMonth(c, thisMonth.key, allTxnsFull);
    return { name:c.name, color:c.color, spent, budget:effBudget, rollover:c.rollover, pct: Math.min(100, effBudget? (spent/effBudget*100):0) };
  }).sort((a,b)=> (b.spent/b.budget) - (a.spent/a.budget));

  return `
    <div class="chip-row">
      ${[3,6,12].map(r=>`<button class="chip ${state.analyticsRange===r?'active':''}" data-range="${r}">${r} MO</button>`).join('')}
    </div>
    ${state.accounts.length > 1 ? `
    <select class="field" id="analytics-account-select" style="margin-bottom:16px;">
      <option value="all" ${state.analyticsAccount==='all'?'selected':''}>All accounts</option>
      ${state.accounts.map(a=>`<option value="${a.id}" ${String(state.analyticsAccount)===String(a.id)?'selected':''}>${escapeHtml(a.name)}</option>`).join('')}
    </select>` : ''}

    ${insights.length ? `
    <div class="section-label">Insights</div>
    <div class="card" style="margin-bottom:18px;">
      ${insights.map(text => `<div class="insight-row">${text}</div>`).join('')}
    </div>` : ''}

    <div class="stat-grid">
      <div class="stat-tile"><span class="lbl">Total saved</span><span class="val" style="color:${netSaved>=0?'var(--green)':'var(--red)'}">${fmtCompact(netSaved)}</span></div>
      <div class="stat-tile"><span class="lbl">Savings rate</span><span class="val">${savingsRate.toFixed(0)}%</span></div>
      <div class="stat-tile"><span class="lbl">Avg. daily spend</span><span class="val">${fmtCompact(avgDaily)}</span></div>
      <div class="stat-tile"><span class="lbl">Top category</span><span class="val" style="font-size:13.5px; color:${topCategoryRow?catColor(topCategoryRow.name):'var(--ink)'}">${topCategoryRow ? escapeHtml(topCategoryRow.name) : 'None yet'}</span></div>
    </div>

    <div class="section-label">Income vs. expense <span style="color:var(--ink-dim); text-transform:none; letter-spacing:0;">· tap a month</span></div>
    <div class="card" style="margin-bottom:18px;">
      <div class="legend-row">
        <span class="legend-item"><span class="dot" style="background:var(--green)"></span>Income</span>
        <span class="legend-item"><span class="dot" style="background:var(--red)"></span>Expense</span>
      </div>
      <div class="mbar-chart">
        ${months.map(m => `
          <div class="mbar-group" data-drillmonth="${m.key}" style="cursor:pointer;">
            <div class="mbar-pair">
              <div class="mbar income" style="height:${Math.max(2,m.income/maxVal*100)}%" title="Income ${fmtMoney(m.income)}"></div>
              <div class="mbar expense" style="height:${Math.max(2,m.expense/maxVal*100)}%" title="Expense ${fmtMoney(m.expense)}"></div>
            </div>
            <div class="mbar-mlabel">${monthLabel(m.key).split(' ')[0]}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="section-label">Where it goes (${range}mo)</div>
    <div class="chip-row">
      ${[['category','CATEGORY'],['account','ACCOUNT'],['currency','CURRENCY'],['weekday','WEEKDAY']].map(([v,l])=>`<button class="chip ${slice===v?'active':''}" data-slice="${v}">${l}</button>`).join('')}
    </div>
    <div class="card" style="margin-bottom:18px;">
      ${sliceRows.length ? sliceRows.map(r => {
        const drillable = slice === 'category' || slice === 'account';
        const attr = slice==='category' ? `data-drillcat="${escapeHtml(r.name)}"` : slice==='account' ? `data-drillaccount="${escapeHtml(r.name)}"` : '';
        return `
        <div class="bar-item" ${attr} style="${drillable?'cursor:pointer;':''}">
          <div class="bar-top">
            <span class="name"><span class="dot" style="background:${sliceColor(slice, r.name)}"></span>${escapeHtml(r.name)}</span>
            <span class="stat">${fmtCompact(r.value)} · ${r.pct.toFixed(0)}%</span>
          </div>
          <div class="bar-track"><div class="bar-fill" style="width:${(r.value/maxSlice*100)}%; background:${sliceColor(slice, r.name)};"></div></div>
        </div>
      `;}).join('') : `<div style="color:var(--ink-faint); font-size:13px;">No expenses logged in this range.</div>`}
    </div>

    ${biggest.length ? `
    <div class="section-label">Biggest transactions (${range}mo) <span style="color:var(--ink-dim); text-transform:none; letter-spacing:0;">· tap to edit</span></div>
    <ul class="receipt" style="margin-bottom:18px;">${biggest.map(t=>txnRowHtml(t)).join('')}</ul>` : ''}

    <div class="section-label">Daily spending, ${monthLabel(thisMonth.key)}</div>
    <div class="card" style="margin-bottom:18px;">
      ${calendarHeatmapHtml(thisMonth.key, thisMonth.txns)}
    </div>

    ${goals.length ? `
    <div class="section-label">Goals <span style="color:var(--ink-dim); text-transform:none; letter-spacing:0;">· tap to edit</span></div>
    ${goals.filter(g=>g.type==='monthly').map(g => goalMonthlyCardHtml(g, computeMonthlyGoalProgress(g, thisMonth.txns))).join('')}
    ${goals.filter(g=>g.type==='target').map(g => goalTargetCardHtml(g, computeTargetGoalProgress(g, allTxnsInRange))).join('')}
    ${goals.filter(g=>g.type==='split').map(g => goalSplitCardHtml(g, computeSplitGoalProgress(g, thisMonth.txns, thisMonth.income))).join('')}
    ${goals.filter(g=>g.type==='debt').map(g => goalDebtCardHtml(g, computeDebtProgress(g, allTxnsInRange))).join('')}
    <button class="hairline-btn" data-goto="goals" style="margin:10px 0 18px;">View all goals →</button>
    ` : ''}

    ${budgetRows.length ? `
    <div class="section-label">Budgets this month</div>
    <div class="card">
      ${budgetRows.map(b => budgetBarHtml(b)).join('')}
    </div>` : ''}
  `;
}

/* ---------- MODALS ---------- */
const modalRoot = document.getElementById('modal-root');

function closeModal(){
  const ov = modalRoot.querySelector('.overlay');
  if(!ov) return;
  ov.classList.remove('open');
  setTimeout(()=>{ modalRoot.innerHTML=''; }, 200);
}

function openOverlay(innerHtml){
  modalRoot.innerHTML = `<div class="overlay"><div class="sheet">${innerHtml}</div></div>`;
  const ov = modalRoot.querySelector('.overlay');
  ov.addEventListener('click', (e)=>{ if(e.target === ov) closeModal(); });
  requestAnimationFrame(()=> ov.classList.add('open'));
  return ov;
}

function txnTypeFieldsHtml(type, editing){
  if(type === 'transfer'){
    const fromSel = (editing && editing.fromAccountId) || state.accounts[0].id;
    const defaultTo = state.accounts.find(a => a.id !== fromSel);
    const toSel = (editing && editing.toAccountId) || (defaultTo ? defaultTo.id : null);
    return `
      <div class="field-group">
        <label class="field-label">Amount</label>
        <div class="amount-field">
          <span class="cur">${state.currency.symbol}</span>
          <input id="txn-amount" type="number" inputmode="decimal" step="0.01" min="0" placeholder="0.00" value="${editing? editing.amount : ''}">
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">From account</label>
        <select id="txn-from-account" class="field select-native">${state.accounts.map(a=>`<option value="${a.id}" ${fromSel===a.id?'selected':''}>${escapeHtml(a.name)}</option>`).join('')}</select>
      </div>
      <div class="field-group">
        <label class="field-label">To account</label>
        <select id="txn-to-account" class="field select-native">${state.accounts.map(a=>`<option value="${a.id}" ${toSel===a.id?'selected':''}>${escapeHtml(a.name)}</option>`).join('')}</select>
      </div>
    `;
  }

  const cats = state.categories.filter(c=>c.type===type);
  const catChipsHtml = cats.map(c => `<button type="button" class="cat-chip ${editing && editing.category===c.name ? 'selected':''}" data-cat="${escapeHtml(c.name)}" style="${(editing && editing.category===c.name) ? `background:${c.color};border-color:${c.color};` : ''}">${escapeHtml(c.name)}</button>`).join('');

    <div class="field-group">
      <div class="chip-row" style="margin-bottom:0;">

      </div>
    </div>

      </div>
      <div class="field-group">
        <label class="field-label">Your share</label>
        <div class="amount-field"><input id="txn-split-pct" type="number" min="1" max="100" value="${editing&&editing.splitPct?editing.splitPct:50}"><span class="cur">%</span></div>
      </div>
      <div class="field-group">
        <label class="field-label">Split with</label>
        <input id="txn-split-with" type="text" class="field" placeholder="e.g. a partner or roommate" value="${editing&&editing.splitWith?escapeHtml(editing.splitWith):''}">
      </div>
      <div class="scan-status" id="txn-split-preview" style="display:block;"></div>
