async function openTransactionModal(editId, presetType){
  await refreshCategories();
  await refreshAccounts();
  if(state.accounts.length === 0){
    await saveAccount({name:'Main', color:randomColor(), startingBalance:0, archived:false});
  }
  let editing = null;
  if(editId){ editing = await dbGet('transactions', editId); }
  let type = editing ? editing.type : (presetType || 'expense');

  const html = `
    <div class="sheet-handle"></div>
    <div class="sheet-title">${editing ? 'Edit transaction' : 'New transaction'}</div>
    ${!editing ? `
      <input type="file" accept="image/*" id="scan-slip-file" style="display:none;">
      <button type="button" class="btn" id="scan-slip-btn">📷 Scan a transfer slip</button>
      <div class="scan-hint">Reads the amount, date, and recipient from a bank slip photo. On-device only, check the result before saving.</div>
      <div class="scan-status" id="scan-status" style="display:none;"></div>
    ` : ''}
    <div class="segmented">
      <button type="button" class="seg-btn ${type==='expense'?'active expense':''}" data-type="expense">Expense</button>
      <button type="button" class="seg-btn ${type==='income'?'active income':''}" data-type="income">Income</button>
      ${state.accounts.length>1 ? `<button type="button" class="seg-btn ${type==='transfer'?'active':''}" data-type="transfer">Transfer</button>` : ''}
    </div>
    <div id="txn-type-fields">${txnTypeFieldsHtml(type, editing)}</div>
    <div class="field-group">
      <label class="field-label">Date</label>
      <input id="txn-date" type="date" class="field" value="${editing ? editing.date : ymd(new Date())}">
    </div>
    <div class="field-group">
      <label class="field-label">Note (optional)</label>
      <input id="txn-note" type="text" class="field" placeholder="What was this for?" value="${editing ? escapeHtml(editing.note||'') : ''}">
    </div>
    <button class="btn primary" id="txn-save">Save transaction</button>
    ${editing ? `<button class="btn danger" id="txn-delete">Delete</button>` : ''}
    <button class="btn" id="txn-cancel">Cancel</button>
  `;
  const ov = openOverlay(html);
  let selectedCat = (editing && editing.type!=='transfer') ? editing.category : null;

  const scanFileInput = ov.querySelector('#scan-slip-file');
  if(scanFileInput){
    scanFileInput.addEventListener('change', () => {
      if(scanFileInput.files && scanFileInput.files[0]){
        handleSlipScan(scanFileInput.files[0], ov);
      }
    });
  }

  function updateFxPreview(){
    const amtEl = ov.querySelector('#txn-amount');
    const rateEl = ov.querySelector('#txn-fxrate');
    const preview = ov.querySelector('#txn-fx-preview');
    if(!amtEl || !rateEl || !preview) return;
    const amt = parseFloat(amtEl.value) || 0;
    const rate = parseFloat(rateEl.value) || 0;
    preview.textContent = (amt && rate) ? `= ${fmtMoney(amt*rate)}` : '';
  }
  function updateSplitPreview(){
    const totalEl = ov.querySelector('#txn-split-total');
    const pctEl = ov.querySelector('#txn-split-pct');
    const preview = ov.querySelector('#txn-split-preview');
    if(!totalEl || !pctEl || !preview) return;
    const total = parseFloat(totalEl.value) || 0;
    const pct = parseFloat(pctEl.value) || 0;
    const share = total*pct/100;
    preview.innerHTML = (total && pct) ? `Your share: ${fmtMoney(share)} <button type="button" class="txt-btn accent" id="txn-split-use" style="padding:2px 6px;">Use this amount</button>` : '';
  }

  async function suggestCategoryForNote(note, txnType){
    if(!note || note.trim().length < 2 || txnType === 'transfer') return null;
    const q = note.trim().toLowerCase();
    const all = await getAllTransactions();
    const candidates = all.filter(t => t.type === txnType && t.note && t.note.trim().length >= 2 &&
      (t.note.trim().toLowerCase().includes(q) || q.includes(t.note.trim().toLowerCase())));
    candidates.sort((a,b) => b.date.localeCompare(a.date));
    return candidates.length ? candidates[0].category : null;
  }

  function wireTypeFields(){
    const curSel = ov.querySelector('#txn-currency');
    if(curSel){
      curSel.addEventListener('change', () => {
        const fxGroup = ov.querySelector('#txn-fx-group');
        if(fxGroup) fxGroup.style.display = curSel.value === state.currency.code ? 'none' : '';
        updateFxPreview();
      });
    }
    const amtEl = ov.querySelector('#txn-amount');
    if(amtEl) amtEl.addEventListener('input', updateFxPreview);
    const rateEl = ov.querySelector('#txn-fxrate');
    if(rateEl) rateEl.addEventListener('input', updateFxPreview);
    const splitTotalEl = ov.querySelector('#txn-split-total');
    if(splitTotalEl) splitTotalEl.addEventListener('input', updateSplitPreview);
    const splitPctEl = ov.querySelector('#txn-split-pct');
    if(splitPctEl) splitPctEl.addEventListener('input', updateSplitPreview);
    updateFxPreview();
    updateSplitPreview();
  }
  wireTypeFields();

  const noteInput = ov.querySelector('#txn-note');
  if(noteInput){
    let noteDebounce;
    noteInput.addEventListener('input', () => {
      clearTimeout(noteDebounce);
      noteDebounce = setTimeout(async () => {
        if(selectedCat || type === 'transfer') return;
        const suggestion = await suggestCategoryForNote(noteInput.value, type);
        if(suggestion){
          const chip = ov.querySelector(`#txn-cat-grid .cat-chip[data-cat="${CSS.escape(suggestion)}"]`);
          if(chip && !selectedCat){ chip.click(); toast(`Suggested category: ${suggestion}`); }
        }
      }, 500);
    });
  }

  ov.addEventListener('click', async (e) => {
    if(e.target.id === 'scan-slip-btn'){
      const fi = ov.querySelector('#scan-slip-file');
      if(fi) fi.click();
      return;
    }
    if(e.target.id === 'txn-split-toggle'){
      const fields = ov.querySelector('#txn-split-fields');
      const on = e.target.classList.toggle('active');
      if(fields) fields.style.display = on ? '' : 'none';
      return;
    }
    if(e.target.id === 'txn-split-use'){
      const total = parseFloat(ov.querySelector('#txn-split-total').value) || 0;
      const pct = parseFloat(ov.querySelector('#txn-split-pct').value) || 0;
      ov.querySelector('#txn-amount').value = (total*pct/100).toFixed(2);
      updateFxPreview();
      toast('Amount updated');
      return;
    }
    if(e.target.id === 'txn-fx-fetch'){
      const curSel = ov.querySelector('#txn-currency');
      const rateEl = ov.querySelector('#txn-fxrate');
      const btn = e.target;
      btn.disabled = true;
      const prevLabel = btn.textContent;
      btn.textContent = 'Fetching...';
      try{
        const rate = await fetchFxRate(curSel.value, state.currency.code);
        rateEl.value = rate;
        updateFxPreview();
        toast('Rate fetched');
      }catch(err){
        toast("Couldn't fetch a live rate, enter it manually");
      }finally{
        btn.disabled = false;
        btn.textContent = prevLabel;
      }
      return;
    }
    const segBtn = e.target.closest('.seg-btn');
    if(segBtn){
      type = segBtn.dataset.type;
      selectedCat = null;
      ov.querySelectorAll('.seg-btn').forEach(b=>b.classList.remove('active','income','expense'));
      segBtn.classList.add('active', type!=='transfer' ? type : '');
      ov.querySelector('#txn-type-fields').innerHTML = txnTypeFieldsHtml(type, editing && editing.type===type ? editing : null);
      wireTypeFields();
      return;
    }
    const chip = e.target.closest('#txn-cat-grid .cat-chip');
    if(chip){
      selectedCat = chip.dataset.cat;
      ov.querySelectorAll('#txn-cat-grid .cat-chip').forEach(c=>{ c.classList.remove('selected'); c.style.background=''; c.style.borderColor=''; });
      const col = catColor(selectedCat);
      chip.classList.add('selected');
      chip.style.background = col; chip.style.borderColor = col;
      return;
    }
    if(e.target.id === 'txn-cancel'){ closeModal(); return; }
    if(e.target.id === 'txn-delete'){
      await deleteTransaction(editId);
      closeModal(); toast('Transaction deleted'); renderView();
      return;
    }
    if(e.target.id === 'txn-save'){
      const amount = parseFloat(ov.querySelector('#txn-amount').value);
      const date = ov.querySelector('#txn-date').value;
      const note = ov.querySelector('#txn-note').value.trim();
      if(!amount || amount <= 0){ toast('Enter an amount above 0'); return; }
      if(!date){ toast('Pick a date'); return; }

      if(type === 'transfer'){
        const fromAccountId = parseInt(ov.querySelector('#txn-from-account').value,10);
        const toAccountId = parseInt(ov.querySelector('#txn-to-account').value,10);
        if(fromAccountId === toAccountId){ toast('Pick two different accounts'); return; }
        const data = { type, amount, fromAccountId, toAccountId, date, note, createdAt: editing?editing.createdAt:Date.now() };
        if(editing) data.id = editing.id;
        await saveTransaction(data);
        closeModal(); toast(editing?'Transfer updated':'Transfer saved'); renderView();
        return;
      }

      if(!selectedCat){ toast('Pick a category'); return; }
      const accountId = parseInt(ov.querySelector('#txn-account').value,10);
      const currency = ov.querySelector('#txn-currency').value;
      let fxRate = 1;
      if(currency !== state.currency.code){
        fxRate = parseFloat(ov.querySelector('#txn-fxrate').value);
        if(!fxRate || fxRate <= 0){ toast('Enter an exchange rate for this currency'); return; }
      }
      const baseAmount = currency === state.currency.code ? amount : (amount*fxRate);
      const data = { type, amount, category:selectedCat, accountId, currency, fxRate, baseAmount, date, note, createdAt: editing?editing.createdAt:Date.now() };

      const splitToggle = ov.querySelector('#txn-split-toggle');
      if(splitToggle && splitToggle.classList.contains('active')){
        data.splitEnabled = true;
        data.splitTotal = parseFloat(ov.querySelector('#txn-split-total').value) || null;
        data.splitPct = parseFloat(ov.querySelector('#txn-split-pct').value) || null;
        data.splitWith = ov.querySelector('#txn-split-with').value.trim();
      } else {
        data.splitEnabled = false;
      }

      if(editing) data.id = editing.id;
      await saveTransaction(data);
      closeModal();
      toast(editing ? 'Transaction updated' : 'Transaction saved');
      renderView();
    }
  });
}

      <label class="field-label">Name</label>

    <div class="field-group">
      <label class="field-label">Monthly budget (optional)</label>
      <div class="amount-field">
        <span class="cur">${state.currency.symbol}</span>
        <input id="cat-budget" type="number" inputmode="decimal" min="0" step="0.01" placeholder="No limit" value="${existing && existing.budget ? existing.budget : ''}">
      </div>
    </div>
    <div class="field-group">
      <div class="chip-row" style="margin-bottom:0;">
        <button type="button" class="chip ${rolloverOn?'active':''}" id="cat-rollover-toggle">ROLL OVER UNUSED BUDGET</button>
      </div>
      <div style="font-size:11px; color:var(--ink-faint); margin-top:8px; line-height:1.5;">If you underspend, the leftover carries into next month's budget. If you overspend, next month's budget shrinks by the difference.</div>
    </div>` : ''}
    <div class="field-group">
      <label class="field-label">Color</label>
      <input id="cat-color" type="color" class="field" style="height:44px; padding:4px;" value="${existing ? existing.color : randomColor()}">
    </div>
    <button class="btn primary" id="cat-save">Save category</button>
    <button class="btn" id="cat-cancel">Cancel</button>
  `;
  const ov = openOverlay(html);
  let rollover = rolloverOn;
  ov.addEventListener('click', async (e) => {
    if(e.target.id === 'cat-cancel'){ closeModal(); return; }
    if(e.target.id === 'cat-rollover-toggle'){
      rollover = !rollover;
      e.target.classList.toggle('active', rollover);
      return;
    }
    if(e.target.id === 'cat-save'){
      const name = ov.querySelector('#cat-name').value.trim();
      if(!name){ toast('Enter a category name'); return; }
      const color = ov.querySelector('#cat-color').value;
      const budgetInput = ov.querySelector('#cat-budget');

      const data = { name, type, color, budget, rollover: type==='expense' ? rollover : false };
      if(existing) data.id = existing.id;
      await saveCategory(data);
      closeModal();
      toast('Category saved');
      renderView();
    }
  });
}
function randomColor(){
  const palette = ['#C1443C','#4B8B6B','#C98A3B','#4E7DA6','#A6577E','#8A5FA6','#3E8C8C','#C9A23B','#5A76B0','#6B9C7D'];
  return palette[Math.floor(Math.random()*palette.length)];
}

/* ---------- recurring transaction modal ---------- */
function openRecurringModal(existing){
  const expenseCats = state.categories.filter(c=>c.type==='expense');
  const incomeCats = state.categories.filter(c=>c.type==='income');
  let type = existing ? existing.type : 'expense';

  function catOptionsHtml(){
    const cats = type==='income' ? incomeCats : expenseCats;
    return cats.map(c => `<option value="${escapeHtml(c.name)}" ${existing&&existing.category===c.name?'selected':''}>${escapeHtml(c.name)}</option>`).join('');
  }

  const html = `
    <div class="sheet-handle"></div>
    <div class="sheet-title">${existing ? 'Edit recurring transaction' : 'New recurring transaction'}</div>
    <div class="segmented">
      <button type="button" class="seg-btn ${type==='expense'?'active expense':''}" data-rtype="expense">Expense</button>
      <button type="button" class="seg-btn ${type==='income'?'active income':''}" data-rtype="income">Income</button>
    </div>
    <div class="field-group">
      <label class="field-label">Name</label>
      <input id="rec-name" type="text" class="field" placeholder="e.g. Rent, Salary, Netflix" value="${existing?escapeHtml(existing.name||''):''}">
    </div>
    <div class="field-group">
      <label class="field-label">Amount</label>
      <div class="amount-field"><span class="cur">${state.currency.symbol}</span><input id="rec-amount" type="number" inputmode="decimal" step="0.01" value="${existing?existing.amount:''}"></div>
    </div>
    <div class="field-group">
      <label class="field-label">Category</label>
      <select id="rec-category" class="field select-native">${catOptionsHtml()}</select>
    </div>
    <div class="field-group">
      <label class="field-label">Account</label>
      <select id="rec-account" class="field select-native">${state.accounts.map(a=>`<option value="${a.id}" ${existing&&existing.accountId===a.id?'selected':''}>${escapeHtml(a.name)}</option>`).join('')}</select>
    </div>
    <div class="field-group">
      <label class="field-label">Repeats</label>
      <select id="rec-frequency" class="field select-native">
        <option value="weekly" ${existing&&existing.frequency==='weekly'?'selected':''}>Weekly</option>
        <option value="monthly" ${!existing||existing.frequency==='monthly'?'selected':''}>Monthly</option>
        <option value="yearly" ${existing&&existing.frequency==='yearly'?'selected':''}>Yearly</option>
      </select>
    </div>
    <div class="field-group">
      <label class="field-label">Next due date</label>
      <input id="rec-nextdue" type="date" class="field" value="${existing?existing.nextDueDate:ymd(new Date())}">
    </div>
    <div class="field-group">
      <label class="field-label">When due</label>
      <div class="chip-row">
        <button type="button" class="chip ${(!existing || existing.autoPost) ? 'active' : ''}" data-autopost="1">AUTO-POST</button>
        <button type="button" class="chip ${(existing && !existing.autoPost) ? 'active' : ''}" data-autopost="0">ASK ME FIRST</button>
      </div>
    </div>
    <button class="btn primary" id="rec-save">Save</button>
    ${existing ? `<button class="btn danger" id="rec-delete">Delete</button>` : ''}
    <button class="btn" id="rec-cancel">Cancel</button>
  `;
  const ov = openOverlay(html);
  let autoPost = existing ? !!existing.autoPost : true;

  ov.addEventListener('click', async (e) => {
    const typeBtn = e.target.closest('[data-rtype]');
    if(typeBtn){
      type = typeBtn.dataset.rtype;
      ov.querySelectorAll('[data-rtype]').forEach(b=>b.classList.remove('active','income','expense'));
      typeBtn.classList.add('active', type);
      ov.querySelector('#rec-category').innerHTML = catOptionsHtml();
      return;
    }
    const apBtn = e.target.closest('[data-autopost]');
    if(apBtn){
      autoPost = apBtn.dataset.autopost === '1';
      ov.querySelectorAll('[data-autopost]').forEach(b=>b.classList.remove('active'));
      apBtn.classList.add('active');
      return;
    }
    if(e.target.id === 'rec-cancel'){ closeModal(); return; }
    if(e.target.id === 'rec-delete'){
      await deleteRecurring(existing.id); closeModal(); toast('Recurring transaction removed'); renderView();
      return;
    }
    if(e.target.id === 'rec-save'){
      const name = ov.querySelector('#rec-name').value.trim();
      const amount = parseFloat(ov.querySelector('#rec-amount').value);
      const category = ov.querySelector('#rec-category').value;
      const accountId = parseInt(ov.querySelector('#rec-account').value,10);
      const frequency = ov.querySelector('#rec-frequency').value;
      const nextDueDate = ov.querySelector('#rec-nextdue').value;
      if(!amount || amount<=0){ toast('Enter an amount'); return; }
      if(!category){ toast('Pick a category'); return; }
      if(!nextDueDate){ toast('Pick the next due date'); return; }
      const data = { name, type, amount, category, accountId, frequency, nextDueDate, autoPost, active:true };
      if(existing) data.id = existing.id;
      await saveRecurring(data);
      closeModal(); toast('Recurring transaction saved'); renderView();
    }
  });
}

function autoTrackFieldsHtml(g){
  const auto = g ? !!g.autoTrack : false;
  const share = (g && g.autoSharePct) ? g.autoSharePct : 20;

async function openGoalModal(editId){
  await refreshCategories();
  let existing = null;
  if(editId){ existing = await dbGet('goals', editId); }
  let type = existing ? existing.type : 'monthly';

  const html = `
    <div class="sheet-handle"></div>
    <div class="sheet-title">${existing ? 'Edit goal' : 'New goal'}</div>
    <div class="field-group">
      <label class="field-label">Name</label>
      <input id="goal-name" type="text" class="field" placeholder="e.g. Financial freedom fund" value="${existing?escapeHtml(existing.name):''}">
    </div>
    <div class="chip-row" id="goal-type-chips">
      <button type="button" class="chip ${type==='monthly'?'active':''}" data-gtype="monthly">MONTHLY TARGET</button>
      <button type="button" class="chip ${type==='target'?'active':''}" data-gtype="target">TARGET BY DATE</button>
      <button type="button" class="chip ${type==='split'?'active':''}" data-gtype="split">INCOME SPLIT</button>
      <button type="button" class="chip ${type==='debt'?'active':''}" data-gtype="debt">DEBT PAYOFF</button>
    </div>
    <div id="goal-fields">${goalTypeFieldsHtml(type, existing)}</div>
    <button class="btn primary" id="goal-save">Save goal</button>
    ${existing ? `<button class="btn danger" id="goal-delete">Delete</button>` : ''}
    <button class="btn" id="goal-cancel">Cancel</button>
  `;
  const ov = openOverlay(html);

  let selectedCats = new Set();
  if(existing && (existing.type==='monthly' || existing.type==='target' || existing.type==='debt')) (existing.linkedCategories||[]).forEach(c=>selectedCats.add(c));
  let categoryAssignments = (existing && existing.type==='split') ? {...(existing.categoryAssignments||{})} : {};

  function updateSplitTotal(){
    const total = Array.from(ov.querySelectorAll('.goal-bucket-pct')).reduce((s,el)=>s+(parseFloat(el.value)||0),0);
    const el = ov.querySelector('#goal-split-total');
    if(el) el.textContent = total === 100 ? 'Total: 100%' : `Total: ${total}% (doesn't need to be exactly 100, but usually should be)`;
  }
  if(type === 'split') setTimeout(updateSplitTotal, 0);

  ov.addEventListener('input', (e) => {
    if(e.target.classList.contains('goal-bucket-pct')) updateSplitTotal();
  });
  ov.addEventListener('change', (e) => {
    if(e.target.classList.contains('goal-cat-assign')){
      const cat = e.target.dataset.cat;
      const val = e.target.value;
      if(val === '') delete categoryAssignments[cat];
      else categoryAssignments[cat] = parseInt(val,10);
    }
  });

  ov.addEventListener('click', async (e) => {
    const typeBtn = e.target.closest('[data-gtype]');
    if(typeBtn){
      type = typeBtn.dataset.gtype;
      ov.querySelectorAll('[data-gtype]').forEach(b=>b.classList.remove('active'));
      typeBtn.classList.add('active');
      const preset = (existing && existing.type === type) ? existing : null;
      ov.querySelector('#goal-fields').innerHTML = goalTypeFieldsHtml(type, preset);
      selectedCats = new Set();
      if(preset && (type==='monthly'||type==='target'||type==='debt')) (preset.linkedCategories||[]).forEach(c=>selectedCats.add(c));
      categoryAssignments = (preset && type==='split') ? {...(preset.categoryAssignments||{})} : {};
      if(type === 'split') setTimeout(updateSplitTotal, 0);
      return;
    }
    const catChip = e.target.closest('#goal-cat-grid .cat-chip');
    if(catChip){
      const name = catChip.dataset.cat;
      if(selectedCats.has(name)){
        selectedCats.delete(name); catChip.classList.remove('selected');
        catChip.style.background=''; catChip.style.borderColor='';
      } else {
        selectedCats.add(name); catChip.classList.add('selected');
        const col = catColor(name); catChip.style.background = col; catChip.style.borderColor = col;
      }
      return;
    }
    if(e.target.id === 'goal-autotrack-toggle'){
      const on = e.target.dataset.on === '1';
      const next = !on;
      e.target.dataset.on = next ? '1' : '0';
      e.target.classList.toggle('active', next);
      e.target.textContent = (next?'ON':'OFF') + ", auto-counts part of each month's leftover income";
      const wrap = ov.querySelector('#goal-autoshare-wrap');
      if(wrap) wrap.style.display = next ? '' : 'none';
      return;
    }
    if(e.target.id === 'goal-cancel'){ closeModal(); return; }
    if(e.target.id === 'goal-delete'){
      await dbDelete('goals', existing.id);
      closeModal(); toast('Goal deleted'); renderView();
      return;
    }
    if(e.target.id === 'goal-save'){
      const name = ov.querySelector('#goal-name').value.trim();
      if(!name){ toast('Give the goal a name'); return; }
      const data = { name, type };
      if(existing) data.id = existing.id;
      data.createdAt = existing ? existing.createdAt : Date.now();
      data.startDate = (existing && existing.startDate) ? existing.startDate : ymd(new Date());

      if(type === 'monthly' || type === 'target'){
        const amount = parseFloat(ov.querySelector('#goal-amount').value);
        if(!amount || amount <= 0){ toast('Enter a target amount'); return; }
        data.targetAmount = amount;
        data.linkedCategories = Array.from(selectedCats);
        const toggle = ov.querySelector('#goal-autotrack-toggle');
        data.autoTrack = toggle ? toggle.dataset.on === '1' : false;
        const shareInput = ov.querySelector('#goal-autoshare');
        data.autoSharePct = shareInput ? (parseFloat(shareInput.value)||0) : 0;
        if(type === 'target'){
          const dateVal = ov.querySelector('#goal-date').value;
          data.targetDate = dateVal || null;
        }
      } else if(type === 'debt'){
        const amount = parseFloat(ov.querySelector('#goal-amount').value);
        if(!amount || amount <= 0){ toast('Enter the total debt amount'); return; }
        data.principal = amount;
        data.linkedCategories = Array.from(selectedCats);
      } else {
        const names = Array.from(ov.querySelectorAll('.goal-bucket-name'));
        const pcts = Array.from(ov.querySelectorAll('.goal-bucket-pct'));
        data.buckets = names.map((el,i) => ({ name: el.value.trim() || `Bucket ${i+1}`, pct: parseFloat(pcts[i].value)||0 }));
        data.categoryAssignments = categoryAssignments;
      }

      if(existing){ await dbPut('goals', data); } else { await dbAdd('goals', data); }
      closeModal();
      toast('Goal saved');
      renderView();
    }
  });
}

/* ---------- slip scanning (on-device OCR, best-effort) ----------
   Thai bank transfer slips print the amount, date, and recipient as
   text. The small QR on them is only a verification token, it does
   not contain that data. So this reads the image with OCR and then
   guesses the fields with a few heuristics. Always review before saving. */
function loadTesseract(){
  if(window.Tesseract) return Promise.resolve();
  if(loadTesseract._p) return loadTesseract._p;
  loadTesseract._p = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5.0.4/dist/tesseract.min.js';
    s.onload = () => resolve();
    s.onerror = () => reject(new Error('scanner failed to load'));
    document.head.appendChild(s);
  });
  return loadTesseract._p;
}

const THAI_MONTHS = {
  'ม.ค.':1,'มค':1,'ก.พ.':2,'กพ':2,'มี.ค.':3,'มีค':3,'เม.ย.':4,'เมย':4,
  'พ.ค.':5,'พค':5,'มิ.ย.':6,'มิย':6,'ก.ค.':7,'กค':7,'ส.ค.':8,'สค':8,
  'ก.ย.':9,'กย':9,'ต.ค.':10,'ตค':10,'พ.ย.':11,'พย':11,'ธ.ค.':12,'ธค':12,
};
function normalizeThaiYear(year){
  if(year >= 2400) return year - 543;           // 4-digit Buddhist era
  if(year >= 100) return year;                   // already a plain 4-digit year
  const guess = 1957 + year;                     // 2-digit Buddhist era shorthand (e.g. 69 -> 2026)
  return (guess >= 2015 && guess <= 2035) ? guess : null;
}
function isoDateFrom(y,m,d){ return `${y}-${pad2(m)}-${pad2(d)}`; }

const SLIP_CATEGORY_KEYWORDS = [
  [/7-?eleven|seven ?11/i, 'Food & Drink'],
  [/grab|bts|mrt|taxi|victory ?monument/i, 'Transport'],
  [/electric|water works|\bpwa\b|\bmea\b|\bpea\b|\btrue\b|\bais\b|dtac|internet|wifi/i, 'Bills & Utilities'],
  [/\bwat\b|shrine|amulet|temple/i, 'Charms & Shrines'],
  [/hospital|pharmacy|clinic/i, 'Health'],
];

function parseSlipText(text){
  const result = { amount:null, date:null, note:null, categoryGuess:null };
  const lines = (text||'').split(/\r?\n/).map(l=>l.trim()).filter(Boolean);

  // Amount: prefer numbers on a line mentioning "amount"/"บาท"/"THB", else the largest 2-decimal number found.
  const amtRegex = /([0-9]{1,3}(?:,[0-9]{3})*\.[0-9]{2})/g;
  let best = null, bestKeyword = null;
  for(const line of lines){
    const isKeywordLine = /(จำนวนเงิน|จำนวน|amount|บาท|thb)/i.test(line);
    let m;
    amtRegex.lastIndex = 0;
    while((m = amtRegex.exec(line))){
      const val = parseFloat(m[1].replace(/,/g,''));
      if(isNaN(val)) continue;
      if(isKeywordLine && (bestKeyword===null || val>bestKeyword)) bestKeyword = val;
      if(best===null || val>best) best = val;
    }
  }
  result.amount = bestKeyword !== null ? bestKeyword : best;

  // Date: Thai month abbreviation first, then numeric DD/MM/YY(YY) as a fallback.
  const monthAlt = Object.keys(THAI_MONTHS).map(k=>k.replace('.','\\.')).join('|');
  const thaiMonthPattern = new RegExp('([0-3]?\\d)\\s*(' + monthAlt + ')\\s*(\\d{2,4})','i');
  const tm = text.match(thaiMonthPattern);
  if(tm){
    const day = parseInt(tm[1],10);
    const monKey = Object.keys(THAI_MONTHS).find(k => k.toLowerCase() === tm[2].toLowerCase());
    const month = monKey ? THAI_MONTHS[monKey] : null;
    const year = normalizeThaiYear(parseInt(tm[3],10));
    if(month && day && year) result.date = isoDateFrom(year, month, day);
  }
  if(!result.date){
    const nm = text.match(/([0-3]?\d)[\/\-.]([01]?\d)[\/\-.](\d{2,4})/);
    if(nm){
      const day = parseInt(nm[1],10), month = parseInt(nm[2],10);
      const year = normalizeThaiYear(parseInt(nm[3],10));
      if(year && month>=1 && month<=12 && day>=1 && day<=31) result.date = isoDateFrom(year, month, day);
    }
  }

  // Recipient / note: text following common "to / account name" labels.
  const noteKeywordRegex = /(ไปยัง|ชื่อบัญชี|โอนเงินไปยัง|โอนให้|received by|to account|account name|payee)/i;
  for(let i=0;i<lines.length;i++){
    if(noteKeywordRegex.test(lines[i])){
      let rest = lines[i].replace(noteKeywordRegex,'').replace(/^[:\-\s]+/,'').trim();
      if(!rest && lines[i+1]) rest = lines[i+1].trim();
      if(rest){ result.note = rest.slice(0,40); break; }
    }
  }

  // Category: only guess if it matches a category that actually exists in this app.
  const haystack = ((result.note||'') + ' ' + text).toLowerCase();
  for(const [re, catName] of SLIP_CATEGORY_KEYWORDS){
    if(re.test(haystack) && catByName(catName)){ result.categoryGuess = catName; break; }
  }
  return result;
}

async function handleSlipScan(file, ov){
  const statusEl = ov.querySelector('#scan-status');
  const btn = ov.querySelector('#scan-slip-btn');
  if(!statusEl || !btn) return;
  statusEl.style.display = 'block';
  btn.disabled = true;
  statusEl.textContent = 'Loading scanner… (needs internet the first time)';
  try{
    await loadTesseract();
    statusEl.textContent = 'Reading slip… 0%';
    const { data } = await Tesseract.recognize(file, 'eng+tha', {
      logger: (m) => {
        if(m.status === 'recognizing text'){
          statusEl.textContent = `Reading slip… ${Math.round((m.progress||0)*100)}%`;
        } else if(m.status){
          statusEl.textContent = m.status.replace(/_/g,' ');
        }
      }
    });
    const parsed = parseSlipText(data.text || '');
    if(parsed.amount) ov.querySelector('#txn-amount').value = parsed.amount.toFixed(2);
    if(parsed.date) ov.querySelector('#txn-date').value = parsed.date;
    if(parsed.note) ov.querySelector('#txn-note').value = parsed.note;
    if(parsed.categoryGuess){
      const chip = ov.querySelector(`.cat-chip[data-cat="${CSS.escape(parsed.categoryGuess)}"]`);
      if(chip) chip.click();
    }
    statusEl.textContent = parsed.amount
      ? 'Filled in from the slip. Check everything before saving.'
      : "Couldn't find an amount on that slip. Enter it manually.";
  }catch(err){
    statusEl.textContent = 'Could not read that image. Enter the details manually.';
  }finally{
    btn.disabled = false;
  }
}

}

/* ---------- export / import ---------- */
async function exportBackup(){
  const [transactions, categories, meta, accounts, recurring, goals, boardItems] = await Promise.all([
    dbGetAll('transactions'), dbGetAll('categories'), dbGetAll('meta'), dbGetAll('accounts'), dbGetAll('recurring'), dbGetAll('goals'), dbGetAll('boardItems')
  ]);
  const payload = { version:3, exportedAt:new Date().toISOString(), transactions, categories, meta, accounts, recurring, goals, boardItems };
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = ymd(new Date());
  a.href = url; a.download = `ledger-backup-${stamp}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast('Backup downloaded');
}
async function importBackup(file){
  try{
    const text = await file.text();
    const payload = JSON.parse(text);
    if(!payload.transactions || !payload.categories) throw new Error('bad file');
    await dbClear('transactions'); await dbClear('categories'); await dbClear('meta');
    await dbClear('accounts'); await dbClear('recurring'); await dbClear('goals'); await dbClear('boardItems');
    for(const t of payload.transactions){ const {id, ...rest} = t; await dbAdd('transactions', rest); }
    for(const c of payload.categories){ const {id, ...rest} = c; await dbAdd('categories', rest); }
    for(const m of (payload.meta||[])){ await dbPut('meta', m); }
    for(const a of (payload.accounts||[])){ const {id, ...rest} = a; await dbAdd('accounts', rest); }
    for(const r of (payload.recurring||[])){ const {id, ...rest} = r; await dbAdd('recurring', rest); }
    for(const g of (payload.goals||[])){ const {id, ...rest} = g; await dbAdd('goals', rest); }
    for(const b of (payload.boardItems||[])){ const {id, ...rest} = b; await dbAdd('boardItems', rest); }
    await refreshCategories();
    await refreshAccounts();
    await loadCurrency();
    await loadTheme();
    await ensureSeed(); // in case the backup pre-dates accounts
    toast('Backup restored');
    renderView();
  }catch(err){
    toast('Could not read that backup file');
  }
}

function csvEscape(val){
  const s = String(val==null?'':val);
  return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
}
async function exportCSV(){
  const txns = await getAllTransactions();
  const header = ['Date','Type','Category','Account','Amount','Currency','FX Rate','Base Amount','Note'];
  const rows = [header];
  for(const t of txns){
    if(t.type === 'transfer'){
      const from = accountById(t.fromAccountId) ? accountById(t.fromAccountId).name : '';
      const to = accountById(t.toAccountId) ? accountById(t.toAccountId).name : '';
      rows.push([t.date, 'transfer', '', `${from} → ${to}`, t.amount, state.currency.code, 1, t.amount, t.note||'']);
    } else {
      const acct = accountById(t.accountId);
      rows.push([t.date, t.type, t.category, acct?acct.name:'', t.amount, t.currency||state.currency.code, t.fxRate||1, txnValue(t), t.note||'']);
    }
  }
  const csv = rows.map(r => r.map(csvEscape).join(',')).join('\r\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `ledger-transactions-${ymd(new Date())}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast('CSV downloaded');
}

  });
  viewRoot.querySelectorAll('[data-editgoal]').forEach(el => {
    el.addEventListener('click', () => openGoalModal(parseInt(el.dataset.editgoal,10)));
  });
  viewRoot.querySelectorAll('[data-goto]').forEach(el => {
    el.addEventListener('click', () => { state.tab = el.dataset.goto; renderView(); });
  });
  viewRoot.querySelectorAll('[data-gotoaccount]').forEach(el => {
    el.addEventListener('click', () => { state.tab = 'ledger'; state.ledgerAccount = el.dataset.gotoaccount; renderView(); });
  });
  viewRoot.querySelectorAll('[data-confirmrec]').forEach(el => {
    el.addEventListener('click', async () => { await confirmRecurring(parseInt(el.dataset.confirmrec,10)); toast('Posted'); renderView(); });
  });
  viewRoot.querySelectorAll('[data-skiprec]').forEach(el => {
    el.addEventListener('click', async () => { await skipRecurring(parseInt(el.dataset.skiprec,10)); toast('Skipped'); renderView(); });
  });

  if(state.tab === 'ledger'){
    viewRoot.querySelectorAll('[data-month]').forEach(el => {
      el.addEventListener('click', () => { state.month = addMonths(state.month, parseInt(el.dataset.month,10)); renderView(); });
    });
    viewRoot.querySelectorAll('[data-filter]').forEach(el => {
      el.addEventListener('click', () => { state.ledgerFilter = el.dataset.filter; renderView(); });
    });
    const catSel = viewRoot.querySelector('#ledger-cat-select');
    if(catSel) catSel.addEventListener('change', () => { state.ledgerCategory = catSel.value; renderView(); });
    const acctSel = viewRoot.querySelector('#ledger-account-select');
    if(acctSel) acctSel.addEventListener('change', () => { state.ledgerAccount = acctSel.value; renderView(); });
    const search = viewRoot.querySelector('#ledger-search');
    if(search){
      search.addEventListener('input', () => { state.ledgerSearch = search.value; });
      search.addEventListener('change', () => renderView());
      let debounce;
      search.addEventListener('input', () => { clearTimeout(debounce); debounce = setTimeout(()=>renderView(), 400); });
    }
  }

  if(state.tab === 'board'){
    attachBoardInteraction();
    viewRoot.querySelectorAll('[data-boardtool]').forEach(el => {
      el.addEventListener('click', async () => {
        const tool = el.dataset.boardtool;
        if(tool === 'deselect'){ state.boardSelectedId = null; renderView(); return; }
        const item = boardItemsCache.find(x => x.id === state.boardSelectedId);
        if(!item) return;
        if(tool === 'delete'){
          openConfirm('Remove this from your board?', async () => {
            await dbDelete('boardItems', item.id);
            state.boardSelectedId = null;
            toast('Removed'); renderView();
          }, true);
          return;
        }
        if(tool === 'front'){
          item.zIndex = nextBoardZ();
          await dbPut('boardItems', item);
          renderView();
          return;
        }
        if(tool === 'frame' && item.type === 'photo'){
          const order = [null,'polaroid','washi'];
          const idx = order.indexOf(item.frame||null);
          item.frame = order[(idx+1)%order.length];
          await dbPut('boardItems', item);
          renderView();
          return;
        }
        if(tool === 'caption' && (item.type==='photo' || item.type==='text')){
          openBoardTextModal(item);
          return;
        }
        if(tool === 'goal'){
          openBoardGoalLinkModal(item);
          return;
        }
      });
    });
  }

  if(state.tab === 'analytics'){
    viewRoot.querySelectorAll('[data-range]').forEach(el => {
      el.addEventListener('click', () => { state.analyticsRange = parseInt(el.dataset.range,10); renderView(); });
    });
    const acctSel = viewRoot.querySelector('#analytics-account-select');
    if(acctSel) acctSel.addEventListener('change', () => { state.analyticsAccount = acctSel.value; renderView(); });
    viewRoot.querySelectorAll('[data-slice]').forEach(el => {
      el.addEventListener('click', () => { state.analyticsSlice = el.dataset.slice; renderView(); });
    });
    viewRoot.querySelectorAll('[data-drillmonth]').forEach(el => {
      el.addEventListener('click', () => {
        state.tab = 'ledger'; state.month = el.dataset.drillmonth;
        state.ledgerFilter = 'all'; state.ledgerCategory = 'all'; state.ledgerAccount = 'all';
        renderView();
      });
    });
    viewRoot.querySelectorAll('[data-drillcat]').forEach(el => {
      el.addEventListener('click', () => {
        state.tab = 'ledger'; state.ledgerCategory = el.dataset.drillcat; state.ledgerFilter = 'expense';
        renderView();
      });
    });
    viewRoot.querySelectorAll('[data-drillaccount]').forEach(el => {
      el.addEventListener('click', () => {
        const acct = state.accounts.find(a => a.name === el.dataset.drillaccount);
        if(acct){ state.tab = 'ledger'; state.ledgerAccount = String(acct.id); state.ledgerFilter = 'expense'; renderView(); }
      });
    });
    viewRoot.querySelectorAll('[data-heatday]').forEach(el => {
      el.addEventListener('click', () => {
        state.tab = 'ledger'; state.month = el.dataset.heatday;
        state.ledgerFilter = 'all'; state.ledgerCategory = 'all'; state.ledgerAccount = 'all';
        renderView();
      });
    });
  }

  if(state.tab === 'settings'){
    const pinBtn = viewRoot.querySelector('#pin-setup-btn');
    if(pinBtn) pinBtn.addEventListener('click', async () => {
      const hash = await getPinHash();
      openPinSetupModal(!!hash);
    });

    viewRoot.querySelectorAll('[data-theme]').forEach(el => {
      el.addEventListener('click', async () => { await setThemePref(el.dataset.theme); renderView(); });
    });

    const curSel = viewRoot.querySelector('#currency-select');
    if(curSel) curSel.addEventListener('change', async () => { await setCurrency(curSel.value); renderView(); });

    const addInc = viewRoot.querySelector('#add-income-cat');
    if(addInc) addInc.addEventListener('click', () => openCategoryModal('income', null));
    const addExp = viewRoot.querySelector('#add-expense-cat');
    if(addExp) addExp.addEventListener('click', () => openCategoryModal('expense', null));

    viewRoot.querySelectorAll('[data-editcat]').forEach(el => {
      el.addEventListener('click', () => {
        const cat = state.categories.find(c => c.id === parseInt(el.dataset.editcat,10));
        if(cat) openCategoryModal(cat.type, cat);
      });
    });
    viewRoot.querySelectorAll('[data-delcat]').forEach(el => {
      el.addEventListener('click', () => {
        const id = parseInt(el.dataset.delcat,10);
        const cat = state.categories.find(c => c.id === id);
        openConfirm(`Remove "${escapeHtml(cat?cat.name:'')}"? Past transactions keep their category label, but it won't be selectable for new ones.`, async () => {
          await deleteCategory(id); toast('Category removed'); renderView();
        }, true);
      });
    });

    const exportBtn = viewRoot.querySelector('#export-data');
    if(exportBtn) exportBtn.addEventListener('click', exportBackup);
    const exportCsvBtn = viewRoot.querySelector('#export-csv');
    if(exportCsvBtn) exportCsvBtn.addEventListener('click', exportCSV);
    const importBtn = viewRoot.querySelector('#import-data');
    const importFile = viewRoot.querySelector('#import-file');
    if(importBtn) importBtn.addEventListener('click', () => importFile.click());
    if(importFile) importFile.addEventListener('change', () => {
      if(importFile.files[0]){
        openConfirm('Importing a backup replaces all data currently on this device. Continue?', () => importBackup(importFile.files[0]), true);
      }
    });
    const clearBtn = viewRoot.querySelector('#clear-data');
    if(clearBtn) clearBtn.addEventListener('click', () => {
      openConfirm('This permanently erases every transaction, category, and budget on this device. This cannot be undone.', async () => {
        await dbClear('transactions'); await dbClear('categories'); await dbClear('meta');
        await dbClear('accounts'); await dbClear('recurring'); await dbClear('goals'); await dbClear('boardItems');
        await ensureSeed(); await refreshCategories(); await refreshAccounts(); await loadCurrency(); await loadTheme();
        toast('All data erased'); renderView();
      }, true);
    });

    const addAcct = viewRoot.querySelector('#add-account');
    if(addAcct) addAcct.addEventListener('click', () => openAccountModal(null));
    viewRoot.querySelectorAll('[data-editaccount]').forEach(el => {
      el.addEventListener('click', () => {
        const acct = state.accounts.find(a => a.id === parseInt(el.dataset.editaccount,10));
        if(acct) openAccountModal(acct);
      });
    });
    viewRoot.querySelectorAll('[data-delaccount]').forEach(el => {
      el.addEventListener('click', () => {
        const id = parseInt(el.dataset.delaccount,10);
        const acct = state.accounts.find(a => a.id === id);
        openConfirm(`Remove "${escapeHtml(acct?acct.name:'')}"? Past transactions keep a record, but this account will no longer show on the dashboard.`, async () => {
          await deleteAccount(id); toast('Account removed'); renderView();
        }, true);
      });
    });

    const addRec = viewRoot.querySelector('#add-recurring');
    if(addRec) addRec.addEventListener('click', () => openRecurringModal(null));
    viewRoot.querySelectorAll('[data-editrecurring]').forEach(el => {
      el.addEventListener('click', async () => {
        const rule = await dbGet('recurring', parseInt(el.dataset.editrecurring,10));
        if(rule) openRecurringModal(rule);
      });
    });
    viewRoot.querySelectorAll('[data-delrecurring]').forEach(el => {
      el.addEventListener('click', () => {
        const id = parseInt(el.dataset.delrecurring,10);
        openConfirm('Remove this recurring transaction? It will stop posting going forward.', async () => {
          await deleteRecurring(id); toast('Removed'); renderView();
        }, true);
      });
    });
  }
}

/* ---------- global nav ---------- */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => { state.tab = btn.dataset.tab; renderView(); });
});
document.getElementById('fab-add').addEventListener('click', () => {
  if(state.tab === 'goals') openGoalModal(null);
  else if(state.tab === 'board') openAddBoardItemSheet();
  else openTransactionModal(null);
});

/* ---------- boot ---------- */
(async function init(){
  await ensureSeed();
  await refreshCategories();
  await refreshAccounts();
  await loadCurrency();
  await loadTheme();
  await processRecurring();
  await recordNetWorthSnapshot();

  async function proceed(){
    await renderView();
    handleQuickAddShortcut();
  }

  const pinHash = await getPinHash();
  if(pinHash){
    renderLockScreen(proceed);
  } else {
    await proceed();
  }
})();

function handleQuickAddShortcut(){
  const params = new URLSearchParams(location.search);
  const action = params.get('action');
  if(action === 'new-expense' || action === 'new-income'){
    openTransactionModal(null, action === 'new-income' ? 'income' : 'expense');
    history.replaceState({}, '', location.pathname);
  }
}

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch(()=>{ /* fine if unavailable, e.g. in preview */ });
  });
}
</script>
</body>
</html>
